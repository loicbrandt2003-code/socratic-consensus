<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Socratic Consensus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- ════════════════════════════════════════════════════════
  🔥 FIREBASE CONFIG — À REMPLIR PAR VOTRE DÉVELOPPEUR
  
  Étapes (5 min) :
  1. Aller sur https://console.firebase.google.com
  2. Cliquer "Créer un projet" → donner un nom → continuer
  3. Dans le menu gauche : "Realtime Database" → "Créer une base de données"
  4. Choisir "Démarrer en mode test" → activer
  5. Cliquer l'icône ⚙️ → "Paramètres du projet" → "Vos applications" → icône </>
  6. Donner un nom → copier les valeurs firebaseConfig ci-dessous
════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBRy1jV_YJgqcEhkRIYlDZBoBcCan7mSrk",
    authDomain: "socratic-consensus.firebaseapp.com",
    databaseURL: "https://socratic-consensus-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "socratic-consensus",
    storageBucket: "socratic-consensus.firebasestorage.app",
    messagingSenderId: "210594463007",
    appId: "1:210594463007:web:d1bf1c1ce0ed53b36bc42a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Expose Firebase functions to global scope
  window.FB = {
    // Sessions
    saveSession: (s) => set(ref(db, `sessions/${s.id}`), s),
    deleteSession: (id) => remove(ref(db, `sessions/${id}`)),
    watchSessions: (cb) => onValue(ref(db, 'sessions'), snap => cb(snap.val()||{})),

    // Items
    saveItem: (item) => set(ref(db, `items/${item.id}`), item),
    deleteItem: (id) => remove(ref(db, `items/${id}`)),
    watchItems: (cb) => onValue(ref(db, 'items'), snap => cb(snap.val()||{})),

    // Responses
    pushResponse: (itemId, resp) => push(ref(db, `responses/${itemId}`), resp),
    watchResponses: (itemId, cb) => onValue(ref(db, `responses/${itemId}`), snap => {
      const val = snap.val();
      cb(val ? Object.values(val) : []);
    }),
    watchAllResponses: (cb) => onValue(ref(db, 'responses'), snap => {
      const val = snap.val()||{};
      const result = {};
      Object.entries(val).forEach(([itemId, resps]) => {
        result[itemId] = Object.values(resps);
      });
      cb(result);
    }),
    deleteResponses: (itemId) => remove(ref(db, `responses/${itemId}`)),
  };

  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e8e6e0;--text:#1a1a18;--muted:#888880;
  --accent:#1a1a18;--accent-fg:#fff;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --orange:#ea580c;--orange-bg:#ffedd5;
  --radius:12px;--shadow-lg:0 4px 16px rgba(0,0,0,.12);
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;cursor:pointer}
.nav-logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-actions{display:flex;gap:8px;margin-left:auto}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);
  border-radius:8px;background:transparent;font-family:'Sora',sans-serif;font-size:.8rem;color:var(--text);cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--bg)}
.btn-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;color:var(--text);transition:all .15s}
.btn-back:hover{background:var(--bg)}
.btn-projection{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;
  padding:8px 16px;border-radius:8px;font-family:'Sora',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer}

/* HERO */
.hero{background:linear-gradient(135deg,#f0ede6 0%,#e8e4db 50%,#ddd8cc 100%);
  padding:80px 2rem 100px;border-bottom:1px solid var(--border)}
.hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:16px}
.hero h1 span{color:var(--muted)}
.hero p{font-size:1rem;color:#555;margin-bottom:32px;line-height:1.6;max-width:480px}

/* BUTTONS */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;
  padding:12px 22px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:1px solid var(--border);
  border-radius:8px;background:transparent;font-family:'Sora',sans-serif;font-size:.82rem;color:var(--text);cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:var(--bg)}
.btn-danger-sm{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border:1px solid #fecaca;border-radius:8px;background:transparent;cursor:pointer;color:var(--red);transition:all .15s}
.btn-danger-sm:hover{background:var(--red-bg)}

/* LAYOUT */
.section{padding:48px 2rem;max-width:1200px;margin:0 auto}
.section-title{font-size:1.4rem;font-weight:700;margin-bottom:24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* SESSION CARD */
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;display:flex;flex-direction:column;gap:16px;transition:box-shadow .2s,transform .2s;cursor:pointer}
.session-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-active{background:#dbeafe;color:#1d4ed8}
.btn-manage{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;
  border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Sora',sans-serif;
  font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text)}
.btn-manage:hover{background:var(--bg)}

/* HOW */
.how-section{background:var(--bg);padding:64px 2rem;border-top:1px solid var(--border)}
.how-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.how-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px}
.how-num{font-size:3rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:16px}

/* MANAGER */
.manager-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;padding:24px 2rem;max-width:1200px;margin:0 auto}
.agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:60px 24px;text-align:center;color:var(--muted);font-size:.9rem}

/* AGENDA ITEM */
.agenda-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:12px}
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ai-header h4{font-size:.95rem;font-weight:700}
.badge-pending{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-running{background:#dbeafe;color:#1d4ed8;font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{border:1px solid var(--border);border-radius:8px;padding:12px}
.stat-num{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-num.red{color:var(--red)}.stat-num.green{color:var(--green)}
.stat-label{font-size:.72rem;color:var(--muted);margin-top:2px}
.item-actions{display:flex;gap:8px;align-items:center}

/* LIVE PANEL */
.live-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:sticky;top:72px;max-height:calc(100vh - 100px);overflow-y:auto}
.live-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;
  color:var(--red);background:var(--red-bg);padding:3px 10px;border-radius:20px}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.resp-mini{border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:8px;animation:slideIn .3s ease}
.resp-mini.obj{border-color:#fca5a5;background:#fff5f5}
.resp-mini.ok{border-color:#86efac;background:#f0fdf4}
.resp-name{font-size:.78rem;font-weight:700;margin-bottom:4px}
.resp-name.red{color:var(--red)}.resp-name.green{color:var(--green)}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;
  align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:16px;padding:32px;width:100%;max-width:480px;
  box-shadow:var(--shadow-lg);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:22px}
.modal-close{float:right;width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border:none;background:var(--bg);border-radius:6px;cursor:pointer;font-size:1rem;color:var(--muted)}
.modal-close:hover{background:var(--border)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px}
.form-label span{color:var(--red)}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.85rem;background:var(--bg);transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--accent);background:#fff}
textarea.form-input{resize:vertical;min-height:80px}
.btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-submit:hover{opacity:.9}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* ITEM DETAIL */
.item-detail{max-width:1100px;margin:0 auto;padding:28px 2rem}
.stats-big{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0 24px}
.stat-big{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center}
.stat-big-num{font-size:2.5rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-big-label{font-size:.78rem;color:var(--muted);margin-top:4px}
.detail-layout{display:grid;grid-template-columns:1fr 260px;gap:24px}

/* OBJECTION */
.obj-card{background:#fff5f5;border:1px solid #fca5a5;border-radius:var(--radius);padding:20px;margin-bottom:12px}
.obj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.obj-name{font-size:.92rem;font-weight:700;color:var(--red)}
.risk-badge{padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700;border:1.5px solid}
.risk-certain{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.risk-probable{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.risk-hypo{border-color:#ca8a04;color:#ca8a04;background:#fef9c3}
.obj-fields{display:flex;gap:20px;margin-bottom:10px}
.obj-field-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.obj-field-value{font-size:.83rem;font-weight:600;color:var(--red)}
.obj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 9px;border-radius:4px;font-size:.7rem;font-weight:600}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.amendment-box{background:#fefce8;border:1px solid #fde047;border-radius:6px;padding:10px;margin-top:10px}
.amendment-label{font-size:.7rem;font-weight:600;color:#713f12;margin-bottom:4px}

/* QR PANEL */
.qr-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center;position:sticky;top:72px}
.qr-wrap{display:flex;justify-content:center;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden;padding:12px;background:#fff}

/* VOTE */
.vote-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:20px}
.vote-actions{display:flex;gap:10px}
.btn-vote{flex:1;padding:13px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid}
.btn-vote-for{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-vote-for:hover{background:var(--green);color:#fff}
.btn-vote-against{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-vote-against:hover{background:var(--red);color:#fff}
.btn-vote-abs{background:var(--bg);color:var(--muted);border-color:var(--border)}
.btn-vote-abs:hover{background:var(--border)}

/* PARTICIPANT */
.participant-wrap{max-width:520px;margin:0 auto;padding:24px 16px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:14px}
.q-num{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.q-text{font-size:.95rem;font-weight:600;margin-bottom:16px;line-height:1.4}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{padding:9px 18px;border:1.5px solid var(--border);border-radius:8px;background:transparent;
  font-family:'Sora',sans-serif;font-size:.85rem;cursor:pointer;transition:all .15s;color:var(--text)}
.opt:hover{border-color:var(--accent);background:var(--bg)}
.opt.selected{background:var(--accent);color:#fff;border-color:var(--accent)}

/* PROJECTION */
.projection{background:#0f0f0e;min-height:100vh;color:#fff;font-family:'Sora',sans-serif;padding:48px}
.proj-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:44px}
.proj-stat{background:#1a1a18;border:1px solid #2a2a28;border-radius:12px;padding:28px;text-align:center}
.proj-num{font-size:4rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}

/* FIREBASE WARNING */
.fb-warning{background:#fef9c3;border:1px solid #fde047;border-radius:10px;padding:16px 20px;
  margin:16px 2rem;font-size:.82rem;color:#713f12;display:flex;align-items:flex-start;gap:10px}

@media(max-width:768px){
  .manager-layout,.how-grid,.detail-layout{grid-template-columns:1fr}
  .stats-big{grid-template-columns:repeat(3,1fr)}
}
footer{text-align:center;padding:32px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
</style>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
// WAIT FOR FIREBASE THEN START
// ═══════════════════════════════════════════════════════
function startApp() {
  const isConfigured = !document.querySelector('script[type="module"]').textContent.includes('"VOTRE_API_KEY"');
  App.firebaseOk = isConfigured;
  App.init();
}

if (window._firebaseReady) {
  startApp();
} else {
  window.addEventListener('firebase-ready', startApp);
  // Fallback if module fails to load
  setTimeout(() => { if (!window._firebaseReady) startApp(); }, 3000);
}

// ═══════════════════════════════════════════════════════
// LOCAL CACHE (for instant UI, Firebase is source of truth)
// ═══════════════════════════════════════════════════════
const CACHE = { sessions:{}, items:{}, responses:{} };

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2,10);
const now = () => Date.now();

function I(name) {
  const icons = {
    plus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    back:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>',
    monitor:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
    trash:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>',
    play:'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>',
    qr:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="20" y2="20"/></svg>',
    download:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    print:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',
    warn:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    vote:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
    check:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>',
  };
  return icons[name]||'';
}

function getParticipantUrl(sessionId, itemId) {
  return `${location.origin}${location.pathname}#participate/${sessionId}/${itemId}`;
}

// ═══════════════════════════════════════════════════════
// APP STATE & ROUTER
// ═══════════════════════════════════════════════════════
const App = {
  view: 'home',
  activeSession: null,
  activeItem: null,
  firebaseOk: false,
  _unsubs: [],

  init() {
    // Check URL hash for participant mode
    const hash = location.hash;
    if (hash.startsWith('#participate/')) {
      const parts = hash.slice(1).split('/');
      this.participantSession = parts[1];
      this.participantItem = parts[2];
      this.view = 'participant';
    }
    this.setupFirebaseListeners();
    this.render();
  },

  setupFirebaseListeners() {
    if (!window.FB) return;
    // Unsubscribe previous
    this._unsubs.forEach(fn => fn && fn());
    this._unsubs = [];

    // Watch sessions
    this._unsubs.push(
      window.FB.watchSessions(sessions => {
        CACHE.sessions = sessions;
        this.render();
      })
    );
    // Watch items
    this._unsubs.push(
      window.FB.watchItems(items => {
        CACHE.items = items;
        this.render();
      })
    );
    // Watch all responses
    this._unsubs.push(
      window.FB.watchAllResponses(responses => {
        CACHE.responses = responses;
        this.render();
      })
    );
  },

  navigate(view, extra={}) {
    this.view = view;
    Object.assign(this, extra);
    this.render();
  },

  render() {
    const root = document.getElementById('app');
    switch(this.view) {
      case 'home':        root.innerHTML = renderHome(); break;
      case 'manage':      root.innerHTML = renderManage(this.activeSession); break;
      case 'item':        root.innerHTML = renderItemDetail(this.activeItem); break;
      case 'participant': root.innerHTML = renderParticipant(this.participantSession, this.participantItem); break;
      case 'projection':  root.innerHTML = renderProjection(this.activeItem); break;
    }
    postRender();
  }
};

const PS = { step:'name', name:'', answers:{} };

function renderParticipant(sessionId, itemId) {
  const item = CACHE.items[itemId];

  const nav = `
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">

        </svg>
      </div>
      Socratic Consensus
    </div>
  </nav>`;

  if (PS.step==='done') return `${nav}
    <div class="participant-wrap">
      <div style="text-align:center;padding:60px 0">
        <div style="font-size:4rem;margin-bottom:16px">✅</div>
        <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:8px">Réponse enregistrée</h2>
        <p style="color:var(--muted);font-size:.88rem">Merci pour votre participation. Vos réponses ont été transmises en temps réel.</p>
      </div>
    </div>`;

  if (PS.step==='name') return `${nav}
    <div class="participant-wrap">
      <div style="text-align:center;padding:40px 0 28px">
        <h2 style="font-size:1.6rem;font-weight:800;margin-bottom:8px">Bienvenue</h2>
        ${item?`<p style="color:var(--muted);font-size:.88rem;margin-bottom:28px">Vous participez à :<br/><strong>${item.title}</strong></p>`:''}
      </div>
      <div class="form-group">
        <label class="form-label">Votre nom <span>*</span></label>
        <input class="form-input" id="p-name" placeholder="Prénom Nom" value="${PS.name}" autocomplete="name"
          oninput="PS.name=this.value;document.getElementById('p-cont').disabled=!this.value.trim()"
          onkeydown="if(event.key==='Enter'&&PS.name.trim()){PS.step='q1';App.navigate('participant',{participantSession:'${sessionId}',participantItem:'${itemId}'})}"/>
      </div>
      <button class="btn-submit" id="p-cont" ${PS.name.trim()?'':'disabled'}
        onclick="if(PS.name.trim()){PS.step='q1';App.navigate('participant',{participantSession:'${sessionId}',participantItem:'${itemId}'})}">
        Continuer →
      </button>
    </div>`;

  const A = PS.answers;
  const QUESTIONS = [
    { key:'q1', num:1, q:"Y a-t-il une objection ?", opts:['Oui','Non'],
      go: v => { A.hasObjection=v==='Oui'; return v==='Oui'?'q2':'submit'; }},
    { key:'q2', num:2, q:"Comment percevez-vous ce point ?", opts:['Compréhension','Règlement','Objection'],
      go: v => { A.perception=v; return 'q3'; }},
    { key:'q3', num:3, q:"Quel intérêt est concerné ?", opts:['Personnel','Sous-groupe','Collectif','Juridique','Financier'],
      go: v => { A.interest=v; return 'q4'; }},
    { key:'q4', num:4, q:"Quel est le risque si la décision est adoptée telle quelle ?", opts:['Certain','Probable','Hypothétique'],
      go: v => { A.risk=v; return 'q5'; }},
    { key:'q5', num:5, q:"L'objection protège-t-elle un intérêt collectif ?", opts:['Oui','Non'],
      go: v => { A.collectiveInterest=v==='Oui'; return 'q6'; }},
    { key:'q6', num:6, q:"Est-elle fondée sur un fait vérifiable ?", opts:['Oui','Non'],
      go: v => { A.verifiable=v==='Oui'; return 'q7'; }},
    { key:'q7', num:7, q:"Peut-on lever le risque sans bloquer la décision ?", opts:['Oui','Non'],
      go: v => { A.liftable=v==='Oui'; return 'q8'; }},
    { key:'q8', num:8, q:"Avez-vous une proposition d'amendement ?", isAmendment:true },
  ];

  const step = QUESTIONS.find(q=>q.key===PS.step);
  if (!step) return '';

  const total = A.hasObjection ? 8 : 1;
  const progress = Math.round((step.num/total)*100);

  window._pSelect = (v) => {
    const next = step.go(v);
    if (next==='submit') { doSubmit(sessionId,itemId); return; }
    PS.step = next;
    App.navigate('participant',{participantSession:sessionId,participantItem:itemId});
  };
  window._pAmendSubmit = () => {
    A.amendment = document.getElementById('p-amendment')?.value||'';
    doSubmit(sessionId,itemId);
  };

  return `${nav}
    <div class="participant-wrap">
      <div style="margin-bottom:16px">
        <div style="font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px">${item?.title||''}</div>
        <div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden">
          <div style="background:var(--accent);height:5px;width:${progress}%;transition:width .4s;border-radius:4px"></div>
        </div>
      </div>
      <div class="q-card">
        <div class="q-num">Question ${step.num}/${total}</div>
        <div class="q-text">${step.q}</div>
        ${step.isAmendment ? `
          <textarea class="form-input" id="p-amendment" placeholder="Décrivez votre amendement (optionnel)..." style="margin-bottom:12px">${A.amendment||''}</textarea>
          <button class="btn-submit" onclick="_pAmendSubmit()">Envoyer mes réponses ✓</button>`
        : `<div class="opts">
            ${step.opts.map(o=>`<button class="opt" onclick="_pSelect('${o}')">${o}</button>`).join('')}
          </div>`}
      </div>
    </div>`;
}

function doSubmit(sessionId, itemId) {
  const resp = {
    name: PS.name,
    hasObjection: PS.answers.hasObjection||false,
    perception: PS.answers.perception||null,
    interest: PS.answers.interest||null,
    type: PS.answers.perception||null,
    risk: PS.answers.risk||null,
    collectiveInterest: PS.answers.collectiveInterest||false,
    verifiable: PS.answers.verifiable||false,
    liftable: PS.answers.liftable||false,
    amendment: PS.answers.amendment||'',
    ts: now()
  };
  // Push to Firebase (real-time sync to all devices)
  if (window.FB && App.firebaseOk) {
    window.FB.pushResponse(itemId, resp);
  } else {
    // Fallback: local only
    if (!CACHE.responses[itemId]) CACHE.responses[itemId] = [];
    CACHE.responses[itemId].push(resp);
  }
  PS.step = 'done';
  App.navigate('participant', {participantSession:sessionId, participantItem:itemId});
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function goToItem(itemId) {
  if (window.FB && App.firebaseOk) {
    window.FB.saveItem({...CACHE.items[itemId], status:'active'});
  } else {
    CACHE.items[itemId] = {...CACHE.items[itemId], status:'active'};
  }
  App.navigate('item', {activeItem:itemId});
}

function deleteItem(itemId) {
  if (!confirm('Supprimer ce point et toutes ses réponses ?')) return;
  if (window.FB && App.firebaseOk) {
    window.FB.deleteItem(itemId);
    window.FB.deleteResponses(itemId);
  } else {
    delete CACHE.items[itemId];
    delete CACHE.responses[itemId];
    App.render();
  }
}

// ═══════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════
function openModal(html) {
  closeModal();
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.id = 'modal-root';
  ov.innerHTML = html;
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() { document.getElementById('modal-root')?.remove(); }

function openCreateSession() {
  openModal(`
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Créer une session</h3>
    <div class="form-group">
      <label class="form-label">Nom de la session <span>*</span></label>
      <input class="form-input" id="m-name" placeholder="Ex: AG Résidence Les Pins 2026" autofocus/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="m-desc" placeholder="Informations sur l'assemblée..."></textarea>
    </div>
    <button class="btn-submit" onclick="createSession()">Créer la session</button>
  </div>`);
}
function createSession() {
  const name = document.getElementById('m-name')?.value?.trim();
  if (!name) return;
  const s = { id:uid(), name, description:document.getElementById('m-desc')?.value?.trim()||'', status:'active', createdAt:now() };
  if (window.FB && App.firebaseOk) {
    window.FB.saveSession(s);
  } else {
    CACHE.sessions[s.id] = s;
    App.render();
  }
  closeModal();
  App.navigate('manage', {activeSession:s.id});
}

let _createItemSession = null;
function openCreateItem(sessionId) {
  _createItemSession = sessionId;
  openModal(`
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Nouveau point à l'ordre du jour</h3>
    <div class="form-group">
      <label class="form-label">Titre <span>*</span></label>
      <input class="form-input" id="m-title" placeholder="Ex: Approbation du budget 2026" autofocus/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="m-idesc" placeholder="Détails du point..."></textarea>
    </div>
    <button class="btn-submit" onclick="createItem()">Ajouter</button>
  </div>`);
}
function createItem() {
  const title = document.getElementById('m-title')?.value?.trim();
  if (!title||!_createItemSession) return;
  const item = { id:uid(), sessionId:_createItemSession, title, description:document.getElementById('m-idesc')?.value?.trim()||'', status:'pending', createdAt:now() };
  if (window.FB && App.firebaseOk) {
    window.FB.saveItem(item);
  } else {
    CACHE.items[item.id] = item;
    CACHE.responses[item.id] = [];
    App.render();
  }
  closeModal();
}

function openQRModal(itemId) {
  const item = CACHE.items[itemId];
  if (!item) return;
  const url = getParticipantUrl(item.sessionId, itemId);
  openModal(`
  <div class="modal" style="max-width:400px;text-align:center">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 style="text-align:left">QR Code</h3>
    <p style="font-size:.82rem;font-weight:600;margin-bottom:14px;text-align:left">${item.title}</p>
    <div id="qr-modal-container" style="display:flex;justify-content:center;padding:16px;border:1px solid var(--border);border-radius:10px;background:#fff;margin-bottom:14px"></div>
    <p style="font-size:.68rem;color:var(--muted);margin-bottom:18px;word-break:break-all">${url}</p>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" style="flex:1;font-size:.8rem" onclick="downloadQR('${itemId}')">
        ${I('download')} PNG
      </button>
      <button class="btn-secondary" style="flex:1;font-size:.8rem" onclick="printQR('${itemId}')">
        ${I('print')} PDF
      </button>
    </div>
  </div>`);

  setTimeout(() => {
    const c = document.getElementById('qr-modal-container');
    if (c && typeof QRCode !== 'undefined') {
      new QRCode(c, { text:url, width:220, height:220, correctLevel:QRCode.CorrectLevel.H });
    }
  }, 60);
}

function downloadQR(itemId) {
  const item = CACHE.items[itemId];
  if (!item) return;
  const c = document.querySelector('#qr-modal-container canvas');
  if (!c) { alert('QR code en cours de génération, réessayez.'); return; }
  const out = document.createElement('canvas');
  out.width=400; out.height=480;
  const ctx = out.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,400,480);
  ctx.fillStyle='#888'; ctx.font='13px Arial'; ctx.textAlign='center';
  ctx.fillText('Socratic Consensus', 200, 32);
  ctx.fillStyle='#1a1a18'; ctx.font='bold 17px Arial';
  const words=item.title.split(' '); let line='', y=60;
  for(const w of words){ const t=line+(line?' ':'')+w; if(ctx.measureText(t).width>350&&line){ctx.fillText(line,200,y);line=w;y+=24;}else line=t; }
  ctx.fillText(line,200,y);
  ctx.drawImage(c, 90, y+20, 220, 220);
  ctx.fillStyle='#aaa'; ctx.font='12px Arial';
  ctx.fillText('📱 Scannez pour répondre', 200, y+258);
  const a=document.createElement('a');
  a.download=`QR-${item.title.replace(/[^a-z0-9]/gi,'-')}.png`;
  a.href=out.toDataURL(); a.click();
}

function printQR(itemId) {
  const item = CACHE.items[itemId];
  if (!item) return;
  const c = document.querySelector('#qr-modal-container canvas');
  if (!c) return;
  const url = getParticipantUrl(item.sessionId, itemId);
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap');
    body{font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#fff}
    .p{text-align:center;padding:30mm 20mm}
    .org{font-size:11pt;color:#aaa;margin-bottom:5mm}
    .title{font-size:22pt;font-weight:800;margin-bottom:10mm;color:#1a1a18;line-height:1.2}
    img{width:75mm;height:75mm;border:1px solid #eee;padding:5mm;border-radius:3mm;margin-bottom:8mm}
    .hint{font-size:11pt;color:#666;margin-bottom:4mm}
    .url{font-size:7pt;color:#bbb;word-break:break-all}
    @media print{@page{size:A5;margin:0}body{display:block}.p{padding:20mm}}
  </style></head><body>
  <div class="p">
    <div class="org">Socratic Consensus</div>
    <div class="title">${item.title}</div>
    <img src="${c.toDataURL()}" alt="QR"/>
    <div class="hint">📱 Scannez pour répondre au questionnaire</div>
    <div class="url">${url}</div>
  </div>
  <script>setTimeout(()=>window.print(),500)<\/script>
  </body></html>`);
  w.document.close();
}

// ═══════════════════════════════════════════════════════
// POST-RENDER (generate inline QR codes)
// ═══════════════════════════════════════════════════════
function postRender() {
  const inlineQR = document.getElementById('qr-inline');
  if (inlineQR && App.activeItem) {
    const item = CACHE.items[App.activeItem];
    if (item && typeof QRCode !== 'undefined') {
      setTimeout(() => {
        if (document.getElementById('qr-inline')?.children.length===0) {
          new QRCode(document.getElementById('qr-inline'), {
            text: getParticipantUrl(item.sessionId, App.activeItem),
            width:160, height:160, correctLevel:QRCode.CorrectLevel.H
          });
        }
      }, 60);
    }
  }
  // Focus participant name input
  setTimeout(() => document.getElementById('p-name')?.focus(), 100);
}
</script>
