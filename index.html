<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Socratic Consensus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBRy1jV_YJgqcEhkRIYlDZBoBcCan7mSrk",
    authDomain: "socratic-consensus.firebaseapp.com",
    databaseURL: "https://socratic-consensus-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "socratic-consensus",
    storageBucket: "socratic-consensus.firebasestorage.app",
    messagingSenderId: "210594463007",
    appId: "1:210594463007:web:d1bf1c1ce0ed53b36bc42a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.FB = {
    saveSession:      (s)        => set(ref(db, `sessions/${s.id}`), s),
    deleteSession:    (id)       => remove(ref(db, `sessions/${id}`)),
    watchSessions:    (cb)       => onValue(ref(db, 'sessions'),  snap => cb(snap.val()||{})),
    saveItem:         (item)     => set(ref(db, `items/${item.id}`), item),
    deleteItem:       (id)       => remove(ref(db, `items/${id}`)),
    watchItems:       (cb)       => onValue(ref(db, 'items'),     snap => cb(snap.val()||{})),
    pushResponse:     (iid, r)   => push(ref(db, `responses/${iid}`), r),
    deleteResponses:  (iid)      => remove(ref(db, `responses/${iid}`)),
    watchAllResponses:(cb)       => onValue(ref(db, 'responses'), snap => {
      const v = snap.val()||{};
      const out = {};
      Object.entries(v).forEach(([k,rv]) => { out[k] = Object.values(rv); });
      cb(out);
    }),
  };

  window._fbReady = true;
  window.dispatchEvent(new Event('fb-ready'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e8e6e0;--text:#1a1a18;--muted:#888880;
  --accent:#1a1a18;--green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;--orange:#ea580c;--orange-bg:#ffedd5;
  --radius:12px;--shadow-lg:0 4px 16px rgba(0,0,0,.12);
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;cursor:pointer;text-decoration:none;color:var(--text)}
.nav-logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn-proj{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;
  padding:8px 16px;border-radius:8px;font-family:'Sora',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer}
.btn-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;color:var(--text);flex-shrink:0}
.btn-back:hover{background:var(--bg)}
/* HERO */
.hero{background:linear-gradient(135deg,#f0ede6 0%,#e8e4db 50%,#ddd8cc 100%);padding:80px 2rem 100px;border-bottom:1px solid var(--border)}
.hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:16px}
.hero h1 span{color:var(--muted)}
.hero p{font-size:1rem;color:#555;margin-bottom:32px;line-height:1.6;max-width:480px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:9px;
  font-family:'Sora',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-dark{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.btn-dark:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.btn-dark:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-red{background:transparent;color:var(--red);border:1px solid #fecaca;width:34px;height:34px;padding:0;justify-content:center}
.btn-red:hover{background:var(--red-bg)}
/* LAYOUT */
.wrap{max-width:1200px;margin:0 auto;padding:32px 2rem}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* SESSION CARD */
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;display:flex;flex-direction:column;gap:16px;transition:box-shadow .2s,transform .2s}
.s-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-blue{background:#dbeafe;color:#1d4ed8}
/* HOW */
.how{background:var(--bg);padding:64px 2rem;border-top:1px solid var(--border)}
.how-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.how-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px}
.how-num{font-size:3rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:16px}
/* MANAGER */
.mgr-layout{display:grid;grid-template-columns:1fr 320px;gap:24px}
.agenda-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:60px 24px;text-align:center;color:var(--muted)}
/* AGENDA ITEM */
.a-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:12px}
.a-item-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.a-item-hdr h4{font-size:.95rem;font-weight:700}
.badge-gray{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-run{background:#dbeafe;color:#1d4ed8;font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{border:1px solid var(--border);border-radius:8px;padding:12px}
.stat-n{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-n.r{color:var(--red)}.stat-n.g{color:var(--green)}
.stat-l{font-size:.72rem;color:var(--muted);margin-top:2px}
/* LIVE */
.live-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:sticky;top:72px;max-height:calc(100vh - 100px);overflow-y:auto}
.live-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;
  color:var(--red);background:var(--red-bg);padding:3px 10px;border-radius:20px}
.dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.r-mini{border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:8px;animation:slideIn .3s ease}
.r-mini.obj{border-color:#fca5a5;background:#fff5f5}
.r-mini.ok{border-color:#86efac;background:#f0fdf4}
.r-name{font-size:.78rem;font-weight:700;margin-bottom:4px}
.r-name.r{color:var(--red)}.r-name.g{color:var(--green)}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:16px;padding:32px;width:100%;max-width:460px;
  box-shadow:var(--shadow-lg);animation:mIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:22px}
.m-close{float:right;width:30px;height:30px;border:none;background:var(--bg);border-radius:6px;
  cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
.m-close:hover{background:var(--border)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px}
.fl span{color:var(--red)}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.85rem;background:var(--bg);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent);background:#fff}
textarea.fi{resize:vertical;min-height:80px}
.btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:4px}
.btn-submit:hover{opacity:.9}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
/* ITEM DETAIL */
.stats-big{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0 24px}
.sb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center}
.sb-num{font-size:2.5rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.sb-lbl{font-size:.78rem;color:var(--muted);margin-top:4px}
.detail-layout{display:grid;grid-template-columns:1fr 260px;gap:24px}
/* OBJ CARD */
.obj-card{background:#fff5f5;border:1px solid #fca5a5;border-radius:var(--radius);padding:20px;margin-bottom:12px}
.obj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.obj-name{font-size:.92rem;font-weight:700;color:var(--red)}
.risk-b{padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700;border:1.5px solid}
.rc{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.rp{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.rh{border-color:#ca8a04;color:#ca8a04;background:#fef9c3}
.obj-fields{display:flex;gap:20px;margin-bottom:10px}
.ofl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ofv{font-size:.83rem;font-weight:600;color:var(--red)}
.obj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 9px;border-radius:4px;font-size:.7rem;font-weight:600}
.tg{background:var(--green-bg);color:var(--green)}.tr{background:var(--red-bg);color:var(--red)}
.amend{background:#fefce8;border:1px solid #fde047;border-radius:6px;padding:10px;margin-top:10px}
/* QR PANEL */
.qr-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;text-align:center;position:sticky;top:72px}
.qr-wrap{display:flex;justify-content:center;padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:12px}
/* VOTE */
.vote-s{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:20px}
.vote-btns{display:flex;gap:10px}
.vb{flex:1;padding:13px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid}
.vf{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.vf:hover{background:var(--green);color:#fff}
.va{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.va:hover{background:var(--red);color:#fff}
.vabs{background:var(--bg);color:var(--muted);border-color:var(--border)}
/* PARTICIPANT */
.p-wrap{max-width:520px;margin:0 auto;padding:24px 16px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.q-num{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.q-txt{font-size:.95rem;font-weight:600;margin-bottom:16px;line-height:1.4}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{padding:9px 18px;border:1.5px solid var(--border);border-radius:8px;background:transparent;
  font-family:'Sora',sans-serif;font-size:.85rem;cursor:pointer;transition:all .15s;color:var(--text)}
.opt:hover{border-color:var(--accent);background:var(--bg)}
/* PROJECTION */
.proj{background:#0f0f0e;min-height:100vh;color:#fff;font-family:'Sora',sans-serif;padding:48px}
.proj-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:44px}
.proj-stat{background:#1a1a18;border:1px solid #2a2a28;border-radius:12px;padding:28px;text-align:center}
.proj-num{font-size:4rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
@media(max-width:768px){
  .mgr-layout,.how-grid,.detail-layout{grid-template-columns:1fr}
  .stats-big{grid-template-columns:repeat(3,1fr)}
}
footer{text-align:center;padding:32px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const SITE = "https://socratic-consensus-f9kl.vercel.app";
const uid  = () => Math.random().toString(36).slice(2,10);
const now  = () => Date.now();

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const S = {
  view: 'home',
  session: null,
  item: null,
  pSession: null,
  pItem: null,
  // live data from Firebase
  sessions:  {},
  items:     {},
  responses: {},
  // participant form
  pStep: 'name',
  pName: '',
  pAnswers: {},
};

function participantUrl(sid, iid) {
  return SITE + '/#participate/' + sid + '/' + iid;
}

// ══════════════════════════════════════════════
// ICONS
// ══════════════════════════════════════════════
const IC = {
  plus:     `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  back:     `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>`,
  monitor:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  trash:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>`,
  play:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`,
  qr:       `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="20" y2="20"/></svg>`,
  dl:       `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  print:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>`,
  warn:     `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  vote:     `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,
  check:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`,
  users:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`,
};

// ══════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  switch(S.view) {
    case 'home':       root.innerHTML = vHome(); break;
    case 'manage':     root.innerHTML = vManage(); break;
    case 'item':       root.innerHTML = vItem(); break;
    case 'participant':root.innerHTML = vParticipant(); break;
    case 'projection': root.innerHTML = vProjection(); break;
  }
  afterRender();
}

function go(view, extra={}) {
  Object.assign(S, extra, {view});
  render();
}

// ══════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════
function nav(opts={}) {
  return `
  <nav class="nav">
    ${opts.back ? `<button class="btn-back" onclick="go('${opts.back}')">${IC.back}</button>` : ''}
    <a class="nav-brand" onclick="go('home');return false" href="#">
      <div class="nav-logo">${IC.users}</div>
      Socratic Consensus
    </a>
    ${opts.title ? `<div><div style="font-size:.88rem;font-weight:700">${opts.title}</div><div style="font-size:.72rem;color:var(--muted)">${opts.sub||''}</div></div>` : ''}
    <div class="nav-right">
      ${opts.proj ? `<button class="btn-proj" onclick="go('projection')">${IC.monitor} Projection</button>` : ''}
    </div>
  </nav>`;
}

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function vHome() {
  const sessions = Object.values(S.sessions).filter(s=>s.status==='active');
  return `
  ${nav()}
  <div class="hero">
    <div style="max-width:700px">
      <h1>Processus Socratique<br/><span>pour vos Assemblées Générales</span></h1>
      <p>Identifiez les objections, proposez des amendements et atteignez le consensus grâce à un questionnement structuré en temps réel.</p>
      <button class="btn btn-dark" onclick="openCreateSession()">${IC.plus} Créer une session</button>
    </div>
  </div>
  <div class="wrap">
    <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:24px">Sessions actives</h2>
    ${sessions.length===0
      ? `<div class="empty">Aucune session active. Créez une session pour commencer.</div>`
      : `<div class="cards-grid">${sessions.map(s=>`
          <div class="s-card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
              <div><div style="font-size:1rem;font-weight:700">${esc(s.name)}</div>${s.description?`<div style="font-size:.78rem;color:var(--muted);margin-top:4px">${esc(s.description)}</div>`:''}</div>
              <span class="badge badge-blue" style="flex-shrink:0">Active</span>
            </div>
            <button class="btn btn-outline" onclick="go('manage',{session:'${s.id}'})" style="width:100%">Gérer →</button>
          </div>`).join('')}
        </div>`}
  </div>
  <div class="how">
    <div class="how-grid">

// PARTICIPANT
// ══════════════════════════════════════════════
const QUESTIONS = [
  {k:'q1', n:1, q:"Y a-t-il une objection ?",                              opts:['Oui','Non']},
  {k:'q2', n:2, q:"Comment percevez-vous ce point ?",                      opts:['Compréhension','Règlement','Objection']},
  {k:'q3', n:3, q:"Quel intérêt est concerné ?",                           opts:['Personnel','Sous-groupe','Collectif','Juridique','Financier']},
  {k:'q4', n:4, q:"Quel est le risque si la décision est adoptée telle quelle ?", opts:['Certain','Probable','Hypothétique']},
  {k:'q5', n:5, q:"L'objection protège-t-elle un intérêt collectif ?",    opts:['Oui','Non']},
  {k:'q6', n:6, q:"Est-elle fondée sur un fait vérifiable ?",              opts:['Oui','Non']},
  {k:'q7', n:7, q:"Peut-on lever le risque sans bloquer la décision ?",    opts:['Oui','Non']},
  {k:'q8', n:8, q:"Avez-vous une proposition d'amendement ?",              isAmendment:true},
];

function vParticipant() {
  const item = S.items[S.pItem];
  const pNav = `
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo">${IC.users}</div>
      Socratic Consensus
    </div>
  </nav>`;

  if (S.pStep==='done') return `${pNav}
    <div class="p-wrap" style="text-align:center;padding-top:60px">
      <div style="font-size:4rem;margin-bottom:16px">✅</div>
      <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:8px">Réponse enregistrée</h2>
      <p style="color:var(--muted);font-size:.88rem">Merci pour votre participation.<br/>Vos réponses ont été transmises en temps réel.</p>
    </div>`;

  if (S.pStep==='name') return `${pNav}
    <div class="p-wrap">
      <div style="text-align:center;padding:40px 0 28px">
        <h2 style="font-size:1.6rem;font-weight:800;margin-bottom:8px">Bienvenue</h2>
        ${item?`<p style="color:var(--muted);font-size:.88rem;margin-bottom:28px">Vous participez à :<br/><strong>${esc(item.title)}</strong></p>`:''}
      </div>
      <div class="fg">
        <label class="fl">Votre nom <span>*</span></label>
        <input class="fi" id="p-name-in" placeholder="Prénom Nom" value="${esc(S.pName)}" autocomplete="name"
          oninput="S.pName=this.value;document.getElementById('p-btn').disabled=!this.value.trim()"
          onkeydown="if(event.key==='Enter'&&S.pName.trim()){S.pStep='q1';render()}"/>
      </div>
      <button class="btn-submit" id="p-btn" ${S.pName.trim()?'':'disabled'}
        onclick="if(S.pName.trim()){S.pStep='q1';render()}">
        Continuer →
      </button>
    </div>`;

  const step = QUESTIONS.find(q=>q.k===S.pStep);
  if (!step) return '';

  const A = S.pAnswers;
  const total = A.hasObjection ? 8 : 1;
  const pct = Math.round((step.n/total)*100);

  window._pOpt = (v) => {
    if (step.k==='q1') {
      A.hasObjection = (v==='Oui');
      if (v==='Non') { submitP(); return; }
      S.pStep='q2';
    } else if (step.k==='q2') { A.perception=v; S.pStep='q3'; }
    else if (step.k==='q3') { A.interest=v;   S.pStep='q4'; }
    else if (step.k==='q4') { A.risk=v;       S.pStep='q5'; }
    else if (step.k==='q5') { A.collectiveInterest=(v==='Oui'); S.pStep='q6'; }
    else if (step.k==='q6') { A.verifiable=(v==='Oui');         S.pStep='q7'; }
    else if (step.k==='q7') { A.liftable=(v==='Oui');           S.pStep='q8'; }
    render();
  };
  window._pAmend = () => {
    A.amendment = document.getElementById('p-amend')?.value||'';
    submitP();
  };

  return `${pNav}
    <div class="p-wrap">
      <div style="margin-bottom:16px">
        <div style="font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px">${item?esc(item.title):''}</div>
        <div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden">
          <div style="background:var(--accent);height:5px;width:${pct}%;transition:width .4s;border-radius:4px"></div>
        </div>
      </div>
      <div class="q-card">
        <div class="q-num">Question ${step.n}/${total}</div>
        <div class="q-txt">${step.q}</div>
        ${step.isAmendment?`
          <textarea class="fi" id="p-amend" placeholder="Décrivez votre amendement (optionnel)..." style="margin-bottom:12px">${A.amendment||''}</textarea>
          <button class="btn-submit" onclick="_pAmend()">Envoyer mes réponses ✓</button>`
        :`<div class="opts">${step.opts.map(o=>`<button class="opt" onclick="_pOpt('${o}')">${o}</button>`).join('')}</div>`}
      </div>
    </div>`;
}

function submitP() {
  const resp = {
    name: S.pName,
    hasObjection: S.pAnswers.hasObjection||false,
    perception: S.pAnswers.perception||null,
    interest:   S.pAnswers.interest||null,
    risk:       S.pAnswers.risk||null,
    collectiveInterest: S.pAnswers.collectiveInterest||false,
    verifiable: S.pAnswers.verifiable||false,
    liftable:   S.pAnswers.liftable||false,
    amendment:  S.pAnswers.amendment||'',
    ts: now()
  };
  if (window.FB) {
    window.FB.pushResponse(S.pItem, resp);
  }
  S.pStep = 'done';
  render();
}

function startItem(id) {
  if (!S.items[id]) return;
  const updated = {...S.items[id], status:'active'};
  window.FB?.saveItem(updated);
  S.items[id] = updated;
  go('item', {item:id});
}

function delItem(id) {
  if (!confirm('Supprimer ce point et toutes ses réponses ?')) return;
  window.FB?.deleteItem(id);
  window.FB?.deleteResponses(id);
  delete S.items[id];
  delete S.responses[id];
  render();
}

function openModal(html) {
  closeModal();
  const ov = document.createElement('div');
  ov.className='overlay'; ov.id='modal';
  ov.innerHTML=html;
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  ov.querySelector('.fi, input, textarea')?.focus();
}
function closeModal() { document.getElementById('modal')?.remove(); }

function openCreateSession() {
  openModal(`
  <div class="modal">
    <button class="m-close" onclick="closeModal()">✕</button>
    <h3>Créer une session</h3>
    <div class="fg"><label class="fl">Nom <span>*</span></label><input class="fi" id="m-sn" placeholder="Ex: AG Résidence Les Pins 2026"/></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-sd" placeholder="Informations sur l'assemblée..."></textarea></div>
    <button class="btn-submit" onclick="doCreateSession()">Créer la session</button>
  </div>`);
}
function doCreateSession() {
  const name = document.getElementById('m-sn')?.value?.trim();
  if (!name) return;
  const s = {id:uid(), name, description:document.getElementById('m-sd')?.value?.trim()||'', status:'active', createdAt:now()};
  window.FB?.saveSession(s);
  S.sessions[s.id] = s;
  closeModal();
  go('manage', {session:s.id});
}

let _cItemSession = null;
function openCreateItem(sid) {
  _cItemSession = sid;
  openModal(`
  <div class="modal">
    <button class="m-close" onclick="closeModal()">✕</button>
    <h3>Nouveau point à l'ordre du jour</h3>
    <div class="fg"><label class="fl">Titre <span>*</span></label><input class="fi" id="m-it" placeholder="Ex: Approbation du budget 2026"/></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-id" placeholder="Détails du point..."></textarea></div>
    <button class="btn-submit" onclick="doCreateItem()">Ajouter</button>
  </div>`);
}
function doCreateItem() {
  const title = document.getElementById('m-it')?.value?.trim();
  if (!title||!_cItemSession) return;
  const item = {id:uid(), sessionId:_cItemSession, title, description:document.getElementById('m-id')?.value?.trim()||'', status:'pending', createdAt:now()};
  window.FB?.saveItem(item);
  S.items[item.id] = item;
  S.responses[item.id] = [];
  closeModal();
  render();
}

function openQR(itemId) {
  const item = S.items[itemId];
  if (!item) return;
  const url = participantUrl(item.sessionId, itemId);
  openModal(`
  <div class="modal" style="max-width:400px;text-align:center">
    <button class="m-close" onclick="closeModal()">✕</button>
    <h3 style="text-align:left">QR Code</h3>
    <p style="font-size:.82rem;font-weight:600;text-align:left;margin-bottom:14px">${esc(item.title)}</p>
    <div id="qr-m" style="display:flex;justify-content:center;padding:16px;border:1px solid var(--border);border-radius:10px;background:#fff;margin-bottom:12px"></div>
    <p style="font-size:.68rem;color:var(--muted);word-break:break-all;margin-bottom:16px">${url}</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-dark" style="flex:1" onclick="dlQR('${itemId}')">${IC.dl} PNG</button>
      <button class="btn btn-outline" style="flex:1" onclick="printQR('${itemId}')">${IC.print} PDF</button>
    </div>
  </div>`);
  setTimeout(()=>{
    const c = document.getElementById('qr-m');
    if (c&&typeof QRCode!=='undefined') new QRCode(c,{text:url,width:220,height:220,correctLevel:QRCode.CorrectLevel.H});
  },60);
}

function dlQR(itemId) {
  const item=S.items[itemId]; if(!item) return;
  const cv=document.querySelector('#qr-m canvas'); if(!cv){alert('Patientez…');return;}
  const out=document.createElement('canvas'); out.width=400;out.height=480;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,400,480);
  ctx.fillStyle='#888';ctx.font='13px Arial';ctx.textAlign='center';ctx.fillText('Socratic Consensus',200,32);
  ctx.fillStyle='#1a1a18';ctx.font='bold 17px Arial';
  const ws=item.title.split(' ');let ln='',y=60;
  for(const w of ws){const t=ln+(ln?' ':'')+w;if(ctx.measureText(t).width>350&&ln){ctx.fillText(ln,200,y);ln=w;y+=24;}else ln=t;}
  ctx.fillText(ln,200,y);
  ctx.drawImage(cv,90,y+20,220,220);
  ctx.fillStyle='#aaa';ctx.font='12px Arial';ctx.fillText('📱 Scannez pour répondre',200,y+258);
  const a=document.createElement('a');
  a.download=`QR-${item.title.replace(/[^a-z0-9]/gi,'-')}.png`;
  a.href=out.toDataURL();a.click();
}

function printQR(itemId) {
  const item=S.items[itemId]; if(!item) return;
  const cv=document.querySelector('#qr-m canvas'); if(!cv) return;
  const url=participantUrl(item.sessionId,itemId);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap');
    body{font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#fff}
    .p{text-align:center;padding:20mm}
    .org{font-size:11pt;color:#aaa;margin-bottom:5mm}
    .title{font-size:22pt;font-weight:800;margin-bottom:10mm;color:#1a1a18;line-height:1.2}
    img{width:75mm;height:75mm;border:1px solid #eee;padding:5mm;border-radius:3mm;margin-bottom:8mm}
    .hint{font-size:11pt;color:#666;margin-bottom:4mm}
    .url{font-size:7.5pt;color:#bbb;word-break:break-all}
    @media print{@page{size:A5;margin:0}body{display:block}}
  </style></head><body>
  <div class="p">
    <div class="org">Socratic Consensus</div>
    <div class="title">${esc(item.title)}</div>
    <img src="${cv.toDataURL()}" alt="QR"/>
    <div class="hint">📱 Scannez pour répondre au questionnaire</div>
    <div class="url">${url}</div>
  </div>
  <script>setTimeout(()=>window.print(),500)<\/script>
  </body></html>`);
  w.document.close();
}

// ══════════════════════════════════════════════
// POST RENDER
// ══════════════════════════════════════════════
function afterRender() {
  // QR inline on item detail
  const qrIn = document.getElementById('qr-inline');
  if (qrIn && S.item) {
    const item = S.items[S.item];
    if (item && typeof QRCode!=='undefined') {
      setTimeout(()=>{
        if (document.getElementById('qr-inline') && !document.getElementById('qr-inline').innerHTML) {
          new QRCode(document.getElementById('qr-inline'),{
            text:participantUrl(item.sessionId,S.item), width:160, height:160, correctLevel:QRCode.CorrectLevel.H
          });
        }
      },80);
    }
  }
  // Focus participant name
  setTimeout(()=>document.getElementById('p-name-in')?.focus(),80);
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// FIREBASE LISTENERS
// ══════════════════════════════════════════════
function setupFirebase() {
  if (!window.FB) return;
  window.FB.watchSessions(data => { S.sessions=data; render(); });
  window.FB.watchItems(data    => { S.items=data;    render(); });
  window.FB.watchAllResponses(data => { S.responses=data; render(); });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  // Check hash for participant mode
  const hash = location.hash;
  if (hash.startsWith('#participate/') || hash.startsWith('#/participate/')) {
    const parts = hash.replace('#/','#').slice(1).split('/');
    S.pSession = parts[1];
    S.pItem    = parts[2];
    S.pStep    = 'name';
    S.pName    = '';
    S.pAnswers = {};
    S.view     = 'participant';
  }
  setupFirebase();
  render();
}

if (window._fbReady) {
  init();
} else {
  window.addEventListener('fb-ready', init);
  setTimeout(()=>{ if(!window._fbReady) init(); }, 2000);
}
</script>
</body>
</html>
