<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Socratic Consensus</title>
<!-- Real QR code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e8e6e0;--text:#1a1a18;--muted:#888880;
  --accent:#1a1a18;--accent-fg:#fff;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --orange:#ea580c;--orange-bg:#ffedd5;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.12);
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* ── NAV ── */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;cursor:pointer}
.nav-logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-actions{display:flex;gap:8px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);
  border-radius:8px;background:transparent;font-family:'Sora',sans-serif;font-size:.8rem;
  color:var(--text);cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--bg)}
/* ── HERO ── */
.hero{position:relative;overflow:hidden;
  background:linear-gradient(135deg,#f0ede6 0%,#e8e4db 50%,#ddd8cc 100%);
  padding:80px 2rem 100px;border-bottom:1px solid var(--border)}
.hero-content{position:relative;max-width:700px}
.hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:16px}
.hero h1 span{color:var(--muted)}
.hero p{font-size:1rem;color:#555;margin-bottom:32px;line-height:1.6;max-width:480px}
/* ── BUTTONS ── */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;
  border:none;padding:12px 22px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.88rem;
  font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;
  border:1px solid var(--border);border-radius:8px;background:transparent;
  font-family:'Sora',sans-serif;font-size:.82rem;color:var(--text);cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:var(--bg)}
.btn-danger-sm{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border:1px solid #fecaca;border-radius:8px;background:transparent;cursor:pointer;
  color:var(--red);transition:all .15s}
.btn-danger-sm:hover{background:var(--red-bg)}
/* ── LAYOUT ── */
.section{padding:48px 2rem;max-width:1200px;margin:0 auto}
.section-title{font-size:1.4rem;font-weight:700;margin-bottom:24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* ── SESSION CARD ── */
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;display:flex;flex-direction:column;gap:16px;transition:box-shadow .2s,transform .2s}
.session-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between}
.card-header h3{font-size:1rem;font-weight:700}
.card-header p{font-size:.78rem;color:var(--muted);margin-top:4px}
.badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-active{background:#dbeafe;color:#1d4ed8}
.card-actions{display:flex;gap:8px}
.btn-manage{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;
  font-family:'Sora',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;
  transition:all .15s;color:var(--text)}
.btn-manage:hover{background:var(--bg)}
.btn-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;
  transition:all .15s;color:var(--muted)}
.btn-icon:hover{background:var(--bg);color:var(--text)}
/* ── HOW ── */
.how-section{background:var(--bg);padding:64px 2rem;border-top:1px solid var(--border)}
.how-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.how-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px}
.how-num{font-size:3rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:16px}
.how-card h3{font-size:1rem;font-weight:700;margin-bottom:8px}
.how-card p{font-size:.82rem;color:var(--muted);line-height:1.6}
/* ── MANAGER ── */
.manager-header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 2rem;display:flex;align-items:center;gap:14px}
.manager-header h2{font-size:1rem;font-weight:700}
.manager-header p{font-size:.78rem;color:var(--muted)}
.btn-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;
  color:var(--text);transition:all .15s;flex-shrink:0}
.btn-back:hover{background:var(--bg)}
.btn-projection{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--accent);
  color:#fff;border:none;padding:8px 16px;border-radius:8px;font-family:'Sora',sans-serif;
  font-size:.8rem;font-weight:600;cursor:pointer}
.manager-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;padding:24px 2rem;max-width:1200px}
.agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:60px 24px;text-align:center;color:var(--muted);font-size:.9rem}
/* ── AGENDA ITEM ── */
.agenda-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:12px}
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ai-header h4{font-size:.95rem;font-weight:700}
.badge-pending{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-running{background:#dbeafe;color:#1d4ed8;font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-done{background:var(--green-bg);color:var(--green);font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{border:1px solid var(--border);border-radius:8px;padding:12px}
.stat-num{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-num.red{color:var(--red)}.stat-num.green{color:var(--green)}
.stat-label{font-size:.72rem;color:var(--muted);margin-top:2px}
.item-actions{display:flex;gap:8px;align-items:center}
/* ── LIVE PANEL ── */
.live-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:sticky;top:72px;max-height:calc(100vh - 100px);overflow-y:auto}
.live-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.live-header h4{font-size:.88rem;font-weight:700}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;
  color:var(--red);background:var(--red-bg);padding:3px 10px;border-radius:20px}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty-live{text-align:center;color:var(--muted);font-size:.8rem;padding:28px 0}
.resp-mini{border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:8px;
  animation:slideIn .3s ease}
.resp-mini.obj{border-color:#fca5a5;background:#fff5f5}
.resp-mini.ok{border-color:#86efac;background:#f0fdf4}
.resp-name{font-size:.78rem;font-weight:700;margin-bottom:4px}
.resp-name.red{color:var(--red)}.resp-name.green{color:var(--green)}
.resp-detail{font-size:.72rem;color:var(--muted)}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:16px;padding:32px;width:100%;max-width:480px;
  box-shadow:var(--shadow-lg);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:22px}
.modal-close{float:right;width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border:none;background:var(--bg);border-radius:6px;cursor:pointer;font-size:1rem;color:var(--muted)}
.modal-close:hover{background:var(--border)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px}
.form-label span{color:var(--red)}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.85rem;background:var(--bg);
  transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--accent);background:#fff}
textarea.form-input{resize:vertical;min-height:80px}
.btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:all .15s;margin-top:4px}
.btn-submit:hover{opacity:.9}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
/* ── ITEM DETAIL ── */
.item-detail{max-width:1100px;margin:0 auto;padding:28px 2rem}
.item-detail h2{font-size:1.8rem;font-weight:800;margin-bottom:6px}
.stats-big{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0 24px}
.stat-big{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;text-align:center}
.stat-big-num{font-size:2.5rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-big-label{font-size:.78rem;color:var(--muted);margin-top:4px}
.detail-layout{display:grid;grid-template-columns:1fr 260px;gap:24px}
/* ── OBJECTION CARD ── */
.obj-card{background:#fff5f5;border:1px solid #fca5a5;border-radius:var(--radius);padding:20px;margin-bottom:12px}
.obj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.obj-name{font-size:.92rem;font-weight:700;color:var(--red)}
.risk-badge{padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700;border:1.5px solid}
.risk-certain{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.risk-probable{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.risk-hypo{border-color:#ca8a04;color:#ca8a04;background:#fef9c3}
.obj-fields{display:flex;gap:20px;margin-bottom:10px}
.obj-field-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.obj-field-value{font-size:.83rem;font-weight:600;color:var(--red)}
.obj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 9px;border-radius:4px;font-size:.7rem;font-weight:600}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.amendment-box{background:#fefce8;border:1px solid #fde047;border-radius:6px;padding:10px;margin-top:10px}
.amendment-label{font-size:.7rem;font-weight:600;color:#713f12;margin-bottom:4px}
/* ── QR PANEL ── */
.qr-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;text-align:center;position:sticky;top:72px}
.qr-panel h4{font-size:.88rem;font-weight:700;margin-bottom:14px}
.qr-wrap{display:flex;justify-content:center;margin-bottom:12px;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;padding:12px;background:#fff}
.qr-hint{font-size:.72rem;color:var(--muted);margin-bottom:14px}
/* ── VOTE ── */
.vote-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-top:20px}
.vote-section h3{font-size:.95rem;font-weight:700;margin-bottom:14px}
.vote-actions{display:flex;gap:10px}
.btn-vote{flex:1;padding:13px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.85rem;
  font-weight:600;cursor:pointer;transition:all .15s;border:2px solid}
.btn-vote-for{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-vote-for:hover{background:var(--green);color:#fff}
.btn-vote-against{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-vote-against:hover{background:var(--red);color:#fff}
.btn-vote-abs{background:var(--bg);color:var(--muted);border-color:var(--border)}
.btn-vote-abs:hover{background:var(--border)}
/* ── PARTICIPANT ── */
.participant-wrap{max-width:520px;margin:0 auto;padding:24px 16px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:14px}
.q-num{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.q-text{font-size:.95rem;font-weight:600;margin-bottom:16px;line-height:1.4}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{padding:9px 18px;border:1.5px solid var(--border);border-radius:8px;background:transparent;
  font-family:'Sora',sans-serif;font-size:.85rem;cursor:pointer;transition:all .15s;color:var(--text)}
.opt:hover{border-color:var(--accent);background:var(--bg)}
.opt.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.success-screen{text-align:center;padding:60px 24px}
.success-icon{font-size:4rem;margin-bottom:16px}
/* ── PROJECTION ── */
.projection{background:#0f0f0e;min-height:100vh;color:#fff;font-family:'Sora',sans-serif;padding:48px}
.proj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:44px}
.proj-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:44px}
.proj-stat{background:#1a1a18;border:1px solid #2a2a28;border-radius:12px;padding:28px;text-align:center}
.proj-num{font-size:4rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.proj-label{font-size:.82rem;color:#888;margin-top:8px}
.proj-obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.proj-obj-card{background:#1f0f0f;border:1px solid #7f1d1d;border-radius:10px;padding:18px}
/* ── SETTINGS ── */
.settings-modal{max-width:560px}
.color-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
.color-chip{width:32px;height:32px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s}
.color-chip.selected{border-color:var(--text);transform:scale(1.1)}
/* ── QR EXPORT MODAL ── */
.qr-export-modal{max-width:420px}
#qr-canvas-container canvas{max-width:100% !important}
/* ── PRINT ── */
@media print{
  .no-print{display:none!important}
  body{background:#fff}
  .print-page{width:210mm;min-height:297mm;padding:20mm;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .print-title{font-size:24pt;font-weight:800;margin-bottom:8mm;text-align:center}
  .print-sub{font-size:12pt;color:#666;margin-bottom:12mm;text-align:center}
  .print-qr{margin:0 auto 12mm;border:1px solid #ddd;padding:8mm;border-radius:4mm}
  .print-url{font-size:9pt;color:#888;word-break:break-all;text-align:center;max-width:160mm}
  .print-org{font-size:10pt;color:#aaa;margin-top:8mm}
}
footer{text-align:center;padding:32px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:768px){
  .manager-layout,.how-grid,.detail-layout{grid-template-columns:1fr}
  .stats-big{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="app"></div>

<!-- ════════════════════════════════════════════════════════════════════
     PRINT TEMPLATE (hidden, only rendered for PDF export)
════════════════════════════════════════════════════════════════════ -->
<div id="print-area" style="display:none">
  <div class="print-page">
    <div id="print-org-name" class="print-org" style="margin-bottom:4mm"></div>
    <div id="print-title" class="print-title"></div>
    <div id="print-sub" class="print-sub"></div>
    <div id="print-qr-area" class="print-qr"></div>
    <div id="print-url" class="print-url"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG – personalization persisted in localStorage
// ═══════════════════════════════════════════════════════
const DEFAULT_CONFIG = {
  orgName: 'Socratic Consensus',
  accentColor: '#1a1a18',
  logoUrl: '',
};

function loadConfig() {
  try { return JSON.parse(localStorage.getItem('sc_config')) || DEFAULT_CONFIG; }
  catch { return DEFAULT_CONFIG; }
}
function saveConfig(c) {
  localStorage.setItem('sc_config', JSON.stringify(c));
  applyConfig(c);
}
function applyConfig(c) {
  document.documentElement.style.setProperty('--accent', c.accentColor);
  document.documentElement.style.setProperty('--accent-fg', '#fff');
}

let CFG = loadConfig();
applyConfig(CFG);

// ═══════════════════════════════════════════════════════
// STORE  (in-memory + localStorage persistence)
// ═══════════════════════════════════════════════════════
function loadStore() {
  try {
    const raw = localStorage.getItem('sc_store');
    if (raw) return JSON.parse(raw);
  } catch {}
  return { sessions: {}, items: {}, responses: {} };
}
function saveStore() {
  try { localStorage.setItem('sc_store', JSON.stringify(STORE)); } catch {}
}

const STORE = loadStore();
let _listeners = [];
function notify() { saveStore(); _listeners.forEach(fn => fn()); }
function subscribe(fn) {
  _listeners.push(fn);
  return () => { _listeners = _listeners.filter(l => l !== fn); };
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2, 10);
const now = () => Date.now();

function icon(name) {
  const icons = {
    plus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    back: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>',
    monitor: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',

// ROUTER (hash-based)

const App = {
  view: 'home',
  activeSession: null,
  activeItem: null,
  _tick: 0,
  navigate(view, extra={}) {
    this.view = view;
    Object.assign(this, extra);
    this.render();
  },
  init() {
    subscribe(() => this.render());
    // check hash for participant mode
    const hash = location.hash;
    if (hash.startsWith('#participate/')) {
      const parts = hash.slice(1).split('/');
      this.participantSession = parts[1];
      this.participantItem = parts[2];
      this.view = 'participant';
    }
    this.render();
  },
  render() {
    const root = document.getElementById('app');
    CFG = loadConfig();
    applyConfig(CFG);
    switch(this.view) {
      case 'home': root.innerHTML = renderHome(); break;
      case 'manage': root.innerHTML = renderManage(this.activeSession); break;
      case 'item': root.innerHTML = renderItemDetail(this.activeItem); break;
      case 'participant': root.innerHTML = renderParticipant(this.participantSession, this.participantItem); break;
      case 'projection': root.innerHTML = renderProjection(this.activeItem); break;
    }
    bindEvents();
  }
};

  const allResps = items.flatMap(i=>(STORE.responses||{})[i.id]||[]);
  const participants = new Set(allResps.map(r=>r.name)).size;

  return `
  ${renderNav(session.name, `${participants} participant(s)`, 'home', true)}
  <div class="manager-layout">
    <div>
      <div class="agenda-header">
        <h3 class="section-title" style="margin:0">Ordre du jour</h3>
        <button class="btn-primary" onclick="openCreateItemModal('${sessionId}')">${icon('plus')} Ajouter un point</button>
      </div>
      ${items.length===0
        ? `<div class="empty-state">Aucun point à l'ordre du jour</div>`
        : items.map(item => {
            const resps = (STORE.responses||{})[item.id]||[];
            const obj = resps.filter(r=>r.hasObjection);
            const ok = resps.filter(r=>!r.hasObjection);
            const badge = item.status==='active' ? `<span class="badge-running">En cours</span>`

            return `
            <div class="agenda-item">
              <div class="ai-header"><h4>${item.title}</h4>${badge}</div>
              <div class="stats-row">
                <div class="stat-box"><div class="stat-num">${resps.length}</div><div class="stat-label">Réponses</div></div>
                <div class="stat-box"><div class="stat-num red">${obj.length}</div><div class="stat-label">Objections</div></div>
                <div class="stat-box"><div class="stat-num green">${ok.length}</div><div class="stat-label">OK</div></div>
              </div>
              <div class="item-actions">
                <button class="btn-secondary" onclick="openQRModal('${item.id}')">${icon('qr')} QR Code</button>
                <button class="btn-secondary btn-primary" style="background:var(--accent);color:#fff;border-color:var(--accent)"
                  onclick="startItem('${item.id}')">${icon('play')} ${item.status==='active'?'Voir':'Démarrer'}</button>
                <button class="btn-danger-sm" onclick="deleteItem('${item.id}')">${icon('trash')}</button>
              </div>
            </div>`}).join('')}

    <div>
      <div class="live-panel">
        <div class="live-header">
          <h4>Activité en direct</h4>
          <span class="live-badge"><span class="live-dot"></span> Live</span>
        </div>
        ${allResps.length===0
          ? `<div class="empty-live">En attente de réponses...</div>`
          : [...allResps].reverse().slice(0,10).map(r=>`

              ${r.amendment?`<div style="font-size:.72rem;color:#713f12;margin-top:4px;background:#fefce8;padding:4px 7px;border-radius:4px">💡 ${r.amendment}</div>`:''}
            </div>`).join('')}

  </div>`;

    <div class="obj-top">
      <span class="obj-name">${r.name}</span>
      ${r.risk?`<span class="risk-badge ${riskClass}">Risque ${r.risk}</span>`:''}
    </div>
    <div class="obj-fields">
      ${r.type?`<div><div class="obj-field-label">👁 Type</div><div class="obj-field-value">${r.type}</div></div>`:''}
      ${r.interest?`<div><div class="obj-field-label">👤 Intérêt</div><div class="obj-field-value">${r.interest}</div></div>`:''}
    </div>
    <div class="obj-tags">
      <span class="tag ${r.collectiveInterest?'tag-green':'tag-red'}">⊕ Intérêt collectif: ${r.collectiveInterest?'Oui':'Non'}</span>

  </div>`;
}

      <div class="nav-logo" style="${logoStyle}">
        ${CFG.logoUrl ? `<img src="${CFG.logoUrl}" style="width:22px;height:22px;object-fit:contain;border-radius:4px"/>`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>`}
      </div>
      ${CFG.orgName}
    </div>
  </nav>`;

  if (PState.step === 'done') return `
    ${nav}
    <div class="participant-wrap">
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:8px">Réponse enregistrée</h2>
        <p style="color:var(--muted);font-size:.88rem">Merci pour votre participation. Vos réponses ont été transmises en temps réel.</p>
        <button class="btn-primary" style="margin-top:24px" onclick="PState.step='name';PState.answers={};App.navigate('home')">
          Retour à l'accueil
        </button>
      </div>
    </div>`;

  if (PState.step === 'name') return `
    ${nav}
    <div class="participant-wrap">
      <div style="text-align:center;padding:48px 0 32px">
        <h2 style="font-size:1.6rem;font-weight:800;margin-bottom:8px">Bienvenue</h2>
        <p style="color:var(--muted);margin-bottom:28px;font-size:.88rem">${item?`Vous participez à : "${item.title}"`:''}</p>
      </div>
      <div class="form-group">
        <label class="form-label">Votre nom <span>*</span></label>
        <input class="form-input" id="p-name" placeholder="Prénom Nom" value="${PState.name}"
          oninput="PState.name=this.value"
          onkeydown="if(event.key==='Enter'&&PState.name.trim()){PState.step='q1';App.navigate('participant',{participantSession:'${sessionId}',participantItem:'${itemId}'});}"/>
      </div>
      <button class="btn-submit" ${PState.name.trim()?'':'disabled'}
        onclick="if(PState.name.trim()){PState.step='q1';App.navigate('participant',{participantSession:'${sessionId}',participantItem:'${itemId}'})}">
        Continuer →
      </button>
    </div>`;

  const A = PState.answers;
  const steps = {
    q1: { num:1, total:A.hasObjection?8:1, q:"Y a-t-il une objection ?",
      opts:['Oui','Non'],
      onSelect: v => {
        A.hasObjection = v==='Oui';
        if (v==='Non') { submitParticipant(sessionId,itemId); return; }
        PState.step='q2';
      }},
    q2: { num:2, total:8, q:"Comment percevez-vous ce point ?",
      opts:['Compréhension','Règlement','Objection'],
      onSelect: v => { A.perception=v; PState.step='q3'; }},
    q3: { num:3, total:8, q:"Quel intérêt est concerné ?",
      opts:['Personnel','Sous-groupe','Collectif','Juridique','Financier'],
      onSelect: v => { A.interest=v; PState.step='q4'; }},
    q4: { num:4, total:8, q:"Quel est le risque si la décision est adoptée telle quelle ?",
      opts:['Certain','Probable','Hypothétique'],
      onSelect: v => { A.risk=v; PState.step='q5'; }},
    q5: { num:5, total:8, q:"L'objection protège-t-elle un intérêt collectif ?",
      opts:['Oui','Non'],
      onSelect: v => { A.collectiveInterest=v==='Oui'; PState.step='q6'; }},
    q6: { num:6, total:8, q:"Est-elle fondée sur un fait vérifiable ?",
      opts:['Oui','Non'],
      onSelect: v => { A.verifiable=v==='Oui'; PState.step='q7'; }},
    q7: { num:7, total:8, q:"Peut-on lever le risque sans bloquer la décision ?",
      opts:['Oui','Non'],
      onSelect: v => { A.liftable=v==='Oui'; PState.step='q8'; }},
    q8: { num:8, total:8, q:"Avez-vous une proposition d'amendement ?", isAmendment:true },
  };

  const s = steps[PState.step];
  if (!s) return renderParticipant(sessionId,itemId);

  // Store callbacks
  window._pSelect = (v) => {
    s.onSelect(v);
    App.navigate('participant',{participantSession:sessionId,participantItem:itemId});
  };
  window._pSubmit = () => {
    A.amendment = document.getElementById('p-amendment')?.value||'';
    submitParticipant(sessionId,itemId);
  };

  const progress = Math.round((s.num/s.total)*100);

  return `
    ${nav}
    <div class="participant-wrap">
      <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:4px">${item?.title||'Questionnaire'}</h2>
      <div style="background:var(--border);border-radius:4px;height:4px;margin:12px 0 20px;overflow:hidden">
        <div style="background:var(--accent);height:4px;width:${progress}%;transition:width .3s;border-radius:4px"></div>
      </div>
      <div class="q-card">
        <div class="q-num">Question ${s.num}/${s.total}</div>
        <div class="q-text">${s.q}</div>
        ${s.isAmendment ? `
          <textarea class="form-input" id="p-amendment" placeholder="Décrivez votre amendement (optionnel)..." style="margin-bottom:12px">${A.amendment||''}</textarea>
          <button class="btn-submit" onclick="_pSubmit()">Envoyer mes réponses</button>
        ` : `
          <div class="opts">
            ${s.opts.map(o=>`
              <button class="opt ${A[Object.keys(A).slice(-1)[0]]===o?'selected':''}" onclick="_pSelect('${o}')">${o}</button>
            `).join('')}
          </div>
        `}
      </div>
    </div>`;
}

function submitParticipant(sessionId, itemId) {
  const A = PState.answers;
  if (!STORE.responses) STORE.responses = {};
  if (!STORE.responses[itemId]) STORE.responses[itemId] = [];
  STORE.responses[itemId].push({
    name: PState.name,
    hasObjection: A.hasObjection||false,
    perception: A.perception,
    interest: A.interest,
    risk: A.risk,
    collectiveInterest: A.collectiveInterest,
    verifiable: A.verifiable,
    liftable: A.liftable,
    amendment: A.amendment||'',
    ts: now()
  });
  notify();
  PState.step = 'done';
  App.navigate('participant', {participantSession:sessionId, participantItem:itemId});
}

function getParticipantUrl(sessionId, itemId) {

}

function openQRModal(itemId) {
  const item = (STORE.items||{})[itemId];

  openModal(`
  <div class="modal qr-export-modal" style="text-align:center">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <p style="font-size:.7rem;color:var(--muted);margin-bottom:20px;word-break:break-all">${url}</p>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" style="flex:1;font-size:.82rem" onclick="downloadQR('${itemId}')">
        ${icon('download')} Télécharger PNG
      </button>

      </button>

      Simuler un participant →
    </button>
  </div>`);
  // Generate real QR code after modal is inserted
  setTimeout(() => {
    const container = document.getElementById('qr-canvas-container');
    if (container && typeof QRCode !== 'undefined') {
      new QRCode(container, { text: url, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.H });
    }
  }, 50);
}

function downloadQR(itemId) {
  const item = (STORE.items||{})[itemId];
  if (!item) return;
  const container = document.getElementById('qr-canvas-container');
  const canvas = container?.querySelector('canvas');
  if (!canvas) { alert('QR code non disponible'); return; }

  // Create a larger canvas with title
  const out = document.createElement('canvas');
  out.width = 400; out.height = 500;
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,400,500);

  // Org name
  ctx.fillStyle = '#888880';
  ctx.font = '500 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(CFG.orgName, 200, 36);

  // Title
  ctx.fillStyle = '#1a1a18';
  ctx.font = 'bold 18px Arial';
  // Word wrap
  const words = item.title.split(' ');
  let line = '', y = 68;
  for (const w of words) {
    const test = line + (line?` ${w}`:w);
    if (ctx.measureText(test).width > 340 && line) {
      ctx.fillText(line, 200, y); line = w; y += 26;
    } else line = test;
  }
  ctx.fillText(line, 200, y);

  // QR
  const qrY = y + 24;
  ctx.drawImage(canvas, 90, qrY, 220, 220);

  // Footer
  ctx.fillStyle = '#aaa';
  ctx.font = '12px Arial';
  ctx.fillText('Scannez pour répondre', 200, qrY + 240);

  // Download
  const link = document.createElement('a');
  link.download = `QR-${item.title.replace(/[^a-zA-Z0-9]/g,'-')}.png`;
  link.href = out.toDataURL('image/png');
  link.click();
}

function printQR(itemId) {
  const item = (STORE.items||{})[itemId];
  if (!item) return;
  const container = document.getElementById('qr-canvas-container');
  const canvas = container?.querySelector('canvas');
  if (!canvas) { alert('QR code non disponible'); return; }

  const qrDataUrl = canvas.toDataURL('image/png');
  const url = getParticipantUrl(item.sessionId, itemId);

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8"/>
    <title>QR Code – ${item.title}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
      .page{width:148mm;text-align:center;padding:20mm}
      .org{font-size:11pt;color:#aaa;margin-bottom:6mm}

      .qr-img{width:80mm;height:80mm;border:1px solid #eee;padding:5mm;border-radius:4mm;margin:0 auto 10mm}
      .hint{font-size:10pt;color:#888;margin-bottom:4mm}
      .url{font-size:7.5pt;color:#bbb;word-break:break-all;max-width:120mm;margin:0 auto}
      @media print{
        @page{size:A5;margin:0}
        body{display:block}
        .page{width:100%;padding:20mm}
        .no-print{display:none}
      }
    </style>
  </head><body>
    <div class="page">
      <div class="org">${CFG.orgName}</div>
      <div class="title">${item.title}</div>
      <img class="qr-img" src="${qrDataUrl}" alt="QR Code"/>

      <div class="url">${url}</div>
    </div>
    <script>setTimeout(()=>window.print(),400)<\/script>
  </body></html>`);
  win.document.close();
}

// ── Participant Simulator ──
let _simSession=null,_simItem=null;
function openParticipantSimulator(sessionId, itemId) {
  _simSession=sessionId; _simItem=itemId;
  PState.step='name'; PState.name=''; PState.answers={};
  openModal(`
  <div class="modal" style="max-width:520px">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Vue Participant (simulation)</h3>
    <div id="sim-content"></div>
  </div>`);
  renderSim();
}
function renderSim() {
  const cnt = document.getElementById('sim-content');
  if (!cnt) return;
  const item = (STORE.items||{})[_simItem];
  const A = PState.answers;

  if (PState.step==='name') {
    cnt.innerHTML = `
      <div class="form-group">
        <label class="form-label">Votre nom <span>*</span></label>
        <input class="form-input" id="sim-name" placeholder="Prénom Nom" value="${PState.name}" oninput="PState.name=this.value"/>
      </div>
      <button class="btn-submit" onclick="if(PState.name.trim()){PState.step='q1';renderSim()}" ${PState.name.trim()?'':'disabled'}>Continuer →</button>`;
    return;
  }

  if (PState.step==='done') {
    cnt.innerHTML = `<div class="success-screen" style="padding:32px 0">
      <div class="success-icon">✅</div>
      <h3 style="margin-bottom:8px">Réponse enregistrée !</h3>
      <p style="color:var(--muted);font-size:.85rem">Transmise en temps réel.</p>
      <button class="btn-primary" style="margin-top:16px" onclick="closeModal()">Fermer</button>
    </div>`;
    return;
  }

  const steps = {
    q1:{q:"Y a-t-il une objection ?",opts:['Oui','Non'],k:'hasObjection',next:v=>v==='Oui'?'q2':'submit'},
    q2:{q:"Comment percevez-vous ce point ?",opts:['Compréhension','Règlement','Objection'],k:'perception',next:()=>'q3'},
    q3:{q:"Quel intérêt est concerné ?",opts:['Personnel','Sous-groupe','Collectif','Juridique','Financier'],k:'interest',next:()=>'q4'},
    q4:{q:"Quel est le risque ?",opts:['Certain','Probable','Hypothétique'],k:'risk',next:()=>'q5'},
    q5:{q:"Protège-t-elle un intérêt collectif ?",opts:['Oui','Non'],k:'collectiveInterest',next:()=>'q6'},
    q6:{q:"Est-elle fondée sur un fait vérifiable ?",opts:['Oui','Non'],k:'verifiable',next:()=>'q7'},
    q7:{q:"Peut-on lever le risque sans bloquer ?",opts:['Oui','Non'],k:'liftable',next:()=>'q8'},
    q8:{q:"Amendement proposé (optionnel)",isAmendment:true},
  };
  const s = steps[PState.step];
  const nums = Object.keys(steps);
  const num = nums.indexOf(PState.step)+1;
  const total = A.hasObjection!==false ? 8 : 1;
  const prog = Math.round((num/total)*100);

  cnt.innerHTML = `
    <div style="background:var(--border);border-radius:4px;height:4px;margin:0 0 16px;overflow:hidden">
      <div style="background:var(--accent);height:4px;width:${prog}%;border-radius:4px;transition:width .3s"></div>
    </div>
    <div class="q-card" style="margin:0">
      <div class="q-num">Question ${num}/${total}</div>
      <div class="q-text">${s.q}</div>
      ${s.isAmendment ? `
        <textarea class="form-input" id="sim-amendment" placeholder="Décrivez l'amendement..." style="margin-bottom:12px">${A.amendment||''}</textarea>
        <button class="btn-submit" onclick="_simSubmit()">Envoyer</button>
      ` : `
        <div class="opts">
          ${s.opts.map(o=>`
            <button class="opt ${A[s.k]===o||A[s.k]===(o==='Oui')?' selected':''}" onclick="_simSelect('${s.k}','${o}','${PState.step}')">
              ${o}
            </button>`).join('')}
        </div>
      `}
    </div>`;
}
window._simSelect = (key, val, step) => {
  const boolKeys = ['hasObjection','collectiveInterest','verifiable','liftable'];
  PState.answers[key] = boolKeys.includes(key) ? val==='Oui' : val;
  const steps = {
    q1: v=>v==='Oui'?'q2':'submit',q2:()=>'q3',q3:()=>'q4',q4:()=>'q5',
    q5:()=>'q6',q6:()=>'q7',q7:()=>'q8'
  };
  const next = steps[step]?.(val);
  if (next==='submit') { submitParticipant(_simSession,_simItem); PState.step='done'; renderSim(); return; }
  PState.step = next||'done';
  renderSim();
};
window._simSubmit = () => {
  PState.answers.amendment = document.getElementById('sim-amendment')?.value||'';
  submitParticipant(_simSession, _simItem);
  PState.step = 'done';
  renderSim();
};
