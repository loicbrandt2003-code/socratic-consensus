<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Socratic Consensus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBRy1jV_YJgqcEhkRIYlDZBoBcCan7mSrk",
    authDomain: "socratic-consensus.firebaseapp.com",
    databaseURL: "https://socratic-consensus-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "socratic-consensus",
    storageBucket: "socratic-consensus.firebasestorage.app",
    messagingSenderId: "210594463007",
    appId: "1:210594463007:web:d1bf1c1ce0ed53b36bc42a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.FB = {
    saveSession:      (s)        => set(ref(db, `sessions/${s.id}`), s),
    deleteSession:    (id)       => remove(ref(db, `sessions/${id}`)),
    watchSessions:    (cb)       => onValue(ref(db, 'sessions'),  snap => cb(snap.val()||{})),
    saveItem:         (item)     => set(ref(db, `items/${item.id}`), item),
    deleteItem:       (id)       => remove(ref(db, `items/${id}`)),
    watchItems:       (cb)       => onValue(ref(db, 'items'),     snap => cb(snap.val()||{})),
    pushResponse:     (iid, r)   => push(ref(db, `responses/${iid}`), r),
    deleteResponses:  (iid)      => remove(ref(db, `responses/${iid}`)),
    watchAllResponses:(cb)       => onValue(ref(db, 'responses'), snap => {
      const v = snap.val()||{};
      const out = {};
      Object.entries(v).forEach(([k,rv]) => { out[k] = Object.values(rv); });
      cb(out);
    }),
  };

  window._fbReady = true;
  window.dispatchEvent(new Event('fb-ready'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f5f2;--surface:#fff;--border:#d8e4d8;--text:#1c2b1c;--muted:#6b8f6b;
  --accent:#6b9080;--accent-dark:#4d7060;--accent-light:#e8f0ec;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;--orange:#ea580c;--orange-bg:#ffedd5;
  --radius:12px;--shadow-lg:0 4px 20px rgba(107,144,128,.18);
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;cursor:pointer;text-decoration:none;color:var(--text)}
.nav-logo{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn-proj{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;
  padding:8px 16px;border-radius:8px;font-family:'Sora',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer}
.btn-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;color:var(--text);flex-shrink:0}
.btn-back:hover{background:var(--bg)}
/* HERO */
.hero{background:linear-gradient(135deg,#e8f0ec 0%,#d4e4da 50%,#c2d8cc 100%);padding:80px 2rem 100px;border-bottom:1px solid var(--border)}
.hero-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:48px}
.hero-text{max-width:560px;flex:1}
.hero-logo-big{flex-shrink:0;width:240px;height:240px;filter:drop-shadow(0 12px 40px rgba(77,112,96,.22));animation:floatLogo 4s ease-in-out infinite}
@keyframes floatLogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@media(max-width:900px){.hero-inner{flex-direction:column-reverse;gap:24px;text-align:center}.hero-logo-big{width:160px;height:160px}}
.hero-logo{width:140px;height:140px}}
.hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:16px}
.hero h1 span{color:var(--muted)}
.hero p{font-size:1rem;color:#555;margin-bottom:32px;line-height:1.6;max-width:480px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:9px;
  font-family:'Sora',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-dark{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.btn-dark:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(107,144,128,.4)}
.btn-dark:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-red{background:transparent;color:var(--red);border:1px solid #fecaca;width:34px;height:34px;padding:0;justify-content:center}
.btn-red:hover{background:var(--red-bg)}
/* LAYOUT */
.wrap{max-width:1200px;margin:0 auto;padding:32px 2rem}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* SESSION CARD */
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;display:flex;flex-direction:column;gap:16px;transition:box-shadow .2s,transform .2s}
.s-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.badge{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-blue{background:#dbeafe;color:#1d4ed8}
/* HOW */
.how{background:#e8f0ec;padding:64px 2rem;border-top:1px solid var(--border)}
.how-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.how-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px}
.how-num{font-size:3rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:16px}
/* MANAGER */
.mgr-layout{display:grid;grid-template-columns:1fr 320px;gap:24px}
.agenda-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:60px 24px;text-align:center;color:var(--muted)}
/* AGENDA ITEM */
.a-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:12px}
.a-item-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.a-item-hdr h4{font-size:.95rem;font-weight:700}
.badge-gray{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-run{background:#dbeafe;color:#1d4ed8;font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{border:1px solid var(--border);border-radius:8px;padding:12px}
.stat-n{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-n.r{color:var(--red)}.stat-n.g{color:var(--green)}
.stat-l{font-size:.72rem;color:var(--muted);margin-top:2px}
/* LIVE */
.live-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:sticky;top:72px;max-height:calc(100vh - 100px);overflow-y:auto}
.live-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;
  color:var(--red);background:var(--red-bg);padding:3px 10px;border-radius:20px}
.dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.r-mini{border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:8px;animation:slideIn .3s ease}
.r-mini.obj{border-color:#fca5a5;background:#fff5f5}
.r-mini.ok{border-color:#86efac;background:#f0fdf4}
.r-name{font-size:.78rem;font-weight:700;margin-bottom:4px}
.r-name.r{color:var(--red)}.r-name.g{color:var(--green)}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:16px;padding:32px;width:100%;max-width:460px;
  box-shadow:var(--shadow-lg);animation:mIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:22px}
.m-close{float:right;width:30px;height:30px;border:none;background:var(--bg);border-radius:6px;
  cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
.m-close:hover{background:var(--border)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px}
.fl span{color:var(--red)}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.85rem;background:var(--bg);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent);background:#fff}
textarea.fi{resize:vertical;min-height:80px}
.btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:8px;
  font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:4px}
.btn-submit:hover{opacity:.9}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
/* ITEM DETAIL */
.stats-big{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0 24px}
.sb{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center}
.sb-num{font-size:2.5rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.sb-lbl{font-size:.78rem;color:var(--muted);margin-top:4px}
.detail-layout{display:grid;grid-template-columns:1fr 260px;gap:24px}
/* OBJ CARD */
.obj-card{background:#fff5f5;border:1px solid #fca5a5;border-radius:var(--radius);padding:20px;margin-bottom:12px}
.obj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.obj-name{font-size:.92rem;font-weight:700;color:var(--red)}
.risk-b{padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700;border:1.5px solid}
.rc{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.rp{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.rh{border-color:#ca8a04;color:#ca8a04;background:#fef9c3}
.obj-fields{display:flex;gap:20px;margin-bottom:10px}
.ofl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ofv{font-size:.83rem;font-weight:600;color:var(--red)}
.obj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 9px;border-radius:4px;font-size:.7rem;font-weight:600}
.tg{background:var(--green-bg);color:var(--green)}.tr{background:var(--red-bg);color:var(--red)}
.amend{background:#fefce8;border:1px solid #fde047;border-radius:6px;padding:10px;margin-top:10px}
/* QR PANEL */
.qr-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;text-align:center;position:sticky;top:72px}
.qr-wrap{display:flex;justify-content:center;padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:12px}
/* VOTE */
.vote-s{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:20px}
.vote-btns{display:flex;gap:10px}
.vb{flex:1;padding:13px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid}
.vf{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.vf:hover{background:var(--green);color:#fff}
.va{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.va:hover{background:var(--red);color:#fff}
.vabs{background:var(--bg);color:var(--muted);border-color:var(--border)}
/* PARTICIPANT — modern mobile-first */
.p-body{min-height:100vh;background:linear-gradient(160deg,#f2f5f2 0%,#e4ede7 100%);display:flex;flex-direction:column}
.p-hero{background:linear-gradient(135deg,#6b9080 0%,#4d7060 100%);color:#fff;padding:28px 24px 32px;position:relative;overflow:hidden}
.p-hero::after{content:'';position:absolute;bottom:-24px;left:0;right:0;height:48px;
  background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}
.p-org{font-size:.72rem;font-weight:600;opacity:.6;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.p-item-title{font-size:1.1rem;font-weight:700;line-height:1.3;max-width:400px}
.p-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.p-logo-box{width:44px;height:44px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden}

.p-content{flex:1;padding:32px 20px 24px;max-width:560px;width:100%;margin:0 auto}

/* Progress */
.p-progress{margin-bottom:28px}
.p-progress-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.p-step-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.p-step-count{font-size:.72rem;font-weight:700;color:var(--accent);background:rgba(26,26,24,.08);padding:2px 9px;border-radius:20px}
.p-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.p-bar-fill{height:6px;background:var(--accent);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Question card */
.q-card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 2px 20px rgba(0,0,0,.07);margin-bottom:16px}
.q-num{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-num::before{content:'';display:block;width:18px;height:2px;background:var(--accent);border-radius:2px}
.q-txt{font-size:1.05rem;font-weight:700;line-height:1.45;color:var(--text);margin-bottom:22px}

/* Options — big tap targets */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{width:100%;padding:15px 20px;border:2px solid var(--border);border-radius:14px;
  background:#fff;font-family:'Sora',sans-serif;font-size:.92rem;font-weight:500;
  cursor:pointer;transition:all .18s;color:var(--text);text-align:left;
  display:flex;align-items:center;justify-content:space-between}
.opt::after{content:'→';font-size:1rem;opacity:0;transition:all .18s;transform:translateX(-4px)}
.opt:hover,.opt:active{border-color:var(--accent);background:rgba(26,26,24,.03);color:var(--accent)}
.opt:hover::after,.opt:active::after{opacity:.5;transform:translateX(0)}
/* For 2-option rows (Oui/Non) */
.opts.opts-row{flex-direction:row}
.opts.opts-row .opt{flex:1;justify-content:center;padding:16px 12px;text-align:center}
.opts.opts-row .opt::after{display:none}

/* Name screen */
.p-name-card{background:#fff;border-radius:20px;padding:32px 24px;box-shadow:0 2px 20px rgba(0,0,0,.07)}
.p-name-card h2{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.p-name-card p{color:var(--muted);font-size:.88rem;margin-bottom:24px;line-height:1.5}
.p-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;
  font-family:'Sora',sans-serif;font-size:1rem;background:#f8f7f3;outline:none;transition:all .18s}
.p-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(26,26,24,.06)}
.p-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;
  font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;
  transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.p-btn:hover{opacity:.9;transform:translateY(-1px)}
.p-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* Amendment */
.p-textarea{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;
  font-family:'Sora',sans-serif;font-size:.9rem;background:#f8f7f3;outline:none;
  resize:vertical;min-height:100px;transition:all .18s;margin-bottom:14px}
.p-textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(26,26,24,.06)}

/* Done screen */
.p-done{text-align:center;padding:48px 24px}
.p-done-icon{width:72px;height:72px;background:var(--green-bg);border-radius:50%;display:flex;
  align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem}
.p-done h2{font-size:1.4rem;font-weight:800;margin-bottom:8px}
.p-done p{color:var(--muted);font-size:.9rem;line-height:1.6}
/* PROJECTION */
.proj{background:#0f0f0e;min-height:100vh;color:#fff;font-family:'Sora',sans-serif;padding:48px}
.proj-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:44px}
.proj-stat{background:#1a1a18;border:1px solid #2a2a28;border-radius:12px;padding:28px;text-align:center}
.proj-num{font-size:4rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
@media(max-width:768px){
  .mgr-layout,.how-grid,.detail-layout{grid-template-columns:1fr}
  .stats-big{grid-template-columns:repeat(3,1fr)}
}
footer{text-align:center;padding:32px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const SITE = "https://socratic-consensus-f9kl.vercel.app";
const uid  = () => Math.random().toString(36).slice(2,10);
const now  = () => Date.now();

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const S = {
  view: 'home',
  session: null,
  item: null,
  pSession: null,
  pItem: null,
  // live data from Firebase
  sessions:  {},
  items:     {},
  responses: {},
  // participant form
  pStep: 'name',
  pName: '',
  pAnswers: {},
};

function participantUrl(sid, iid) {
  return SITE + '/#participate/' + sid + '/' + iid;
}

// ══════════════════════════════════════════════
// ICONS
// ══════════════════════════════════════════════
const IC = {
  plus:     `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  back:     `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>`,
  monitor:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  trash:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>`,

function render() {
  const root = document.getElementById('root');
  switch(S.view) {
    case 'home':       root.innerHTML = vHome(); break;
    case 'manage':     root.innerHTML = vManage(); break;
    case 'item':       root.innerHTML = vItem(); break;
    case 'participant':root.innerHTML = vParticipant(); break;
    case 'projection': root.innerHTML = vProjection(); break;
  }
  afterRender();
}

function go(view, extra={}) {
  Object.assign(S, extra, {view});
  render();
}

// ══════════════════════════════════════════════
// MANAGE
// ══════════════════════════════════════════════
function vManage() {
  const session = S.sessions[S.session];
  if (!session) { S.view='home'; return vHome(); }
  const items = Object.values(S.items).filter(i=>i.sessionId===S.session);
  const allR = items.flatMap(i=>S.responses[i.id]||[]);
  const pts = new Set(allR.map(r=>r.name)).size;

  return `
  ${nav({back:'home', title:esc(session.name), sub:`${pts} participant(s)`, proj:true})}
  <div class="wrap">
    <div class="mgr-layout">
      <div>
        <div class="agenda-hdr">
          <h3 style="font-size:1.2rem;font-weight:700">Ordre du jour</h3>
          <button class="btn btn-dark" onclick="openCreateItem('${session.id}')">${IC.plus} Ajouter un point</button>
        </div>
        ${items.length===0
          ? `<div class="empty">Aucun point à l'ordre du jour</div>`
          : items.map(item=>{
              const rs = S.responses[item.id]||[];
              const ob = rs.filter(r=>r.hasObjection);
              const ok = rs.filter(r=>!r.hasObjection);
              return `
              <div class="a-item">
                <div class="a-item-hdr">
                  <h4>${esc(item.title)}</h4>
                  <span class="${item.status==='active'?'badge-run':'badge-gray'}">${item.status==='active'?'En cours':'En attente'}</span>
                </div>
                <div class="stats-row">
                  <div class="stat-box"><div class="stat-n">${rs.length}</div><div class="stat-l">Réponses</div></div>
                  <div class="stat-box"><div class="stat-n r">${ob.length}</div><div class="stat-l">Objections</div></div>
                  <div class="stat-box"><div class="stat-n g">${ok.length}</div><div class="stat-l">OK</div></div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                  <button class="btn btn-outline" onclick="openQR('${item.id}')">${IC.qr} QR Code</button>
                  <button class="btn btn-dark" style="font-size:.8rem;padding:9px 14px" onclick="startItem('${item.id}')">${IC.play} ${item.status==='active'?'Voir':'Démarrer'}</button>
                  <button class="btn btn-red" onclick="delItem('${item.id}')">${IC.trash}</button>
                </div>
              </div>`}).join('')}
      </div>
      <div>
        <div class="live-panel">
          <div class="live-hdr">
            <span style="font-size:.88rem;font-weight:700">Activité en direct</span>
            <span class="live-badge"><span class="dot"></span> Live</span>
          </div>
          ${allR.length===0
            ? `<div style="text-align:center;color:var(--muted);font-size:.8rem;padding:28px 0">En attente de réponses...</div>`
            : [...allR].reverse().slice(0,10).map(r=>`
                <div class="r-mini ${r.hasObjection?'obj':'ok'}">
                  <div class="r-name ${r.hasObjection?'r':'g'}">${esc(r.name)} ${r.hasObjection?'⚠':'✓'}</div>
                  ${r.hasObjection&&r.perception?`<div style="font-size:.72rem;color:var(--muted)">${r.perception}${r.interest?' · '+r.interest:''}${r.risk?' · '+r.risk:''}</div>`:''}
                  ${r.amendment?`<div style="font-size:.72rem;color:#713f12;background:#fefce8;padding:4px 7px;border-radius:4px;margin-top:4px">💡 ${esc(r.amendment)}</div>`:''}
                </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// ITEM DETAIL
// ══════════════════════════════════════════════
function vItem() {
  const item = S.items[S.item];
  if (!item) { S.view='manage'; return vManage(); }
  const rs = S.responses[S.item]||[];
  const ob = rs.filter(r=>r.hasObjection);
  const ok = rs.filter(r=>!r.hasObjection);
  const url = participantUrl(item.sessionId, S.item);

  return `
  ${nav({back:'manage'})}
  <div style="display:flex;align-items:center;gap:12px;padding:10px 2rem;background:var(--surface);border-bottom:1px solid var(--border)">
    <span style="font-size:.85rem;color:var(--muted)">${rs.length} participant(s)</span>
    <span style="background:var(--red-bg);color:var(--red);font-size:.75rem;font-weight:700;padding:3px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:5px">
      <span class="dot"></span> Discussion en direct
    </span>
    <button class="btn btn-proj" style="margin-left:auto" onclick="go('projection')">${IC.monitor} Projection</button>
  </div>
  <div class="wrap">
    <h2 style="font-size:1.8rem;font-weight:800;margin-bottom:6px">${esc(item.title)}</h2>
    ${item.description?`<p style="color:var(--muted);font-size:.85rem;margin-bottom:4px">${esc(item.description)}</p>`:''}
    <div class="stats-big">
      <div class="sb"><div style="font-size:1.3rem;margin-bottom:4px">👥</div><div class="sb-num">${rs.length}</div><div class="sb-lbl">Réponses</div></div>
      <div class="sb" style="border-color:#86efac"><div style="font-size:1.3rem;margin-bottom:4px">✅</div><div class="sb-num" style="color:var(--green)">${ok.length}</div><div class="sb-lbl">Sans objection</div></div>
      <div class="sb" style="border-color:#fca5a5"><div style="font-size:1.3rem;margin-bottom:4px">⚠️</div><div class="sb-num" style="color:var(--red)">${ob.length}</div><div class="sb-lbl">Objections</div></div>
    </div>
    <div class="detail-layout">
      <div>
        ${ob.length>0?`
          <div style="display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;color:var(--red);margin-bottom:14px">${IC.warn} Objections (${ob.length})</div>
          ${ob.map(r=>objCard(r)).join('')}`:''}
        ${ob.length===0&&rs.length>0?`
          <div class="vote-s">
            <h3 style="font-size:.95rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px">${IC.vote} Vote final</h3>
            <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px">Aucune objection — vous pouvez procéder au vote.</p>
            <div class="vote-btns">
              <button class="vb vf">${IC.check} Pour</button>
              <button class="vb va">✗ Contre</button>
              <button class="vb vabs">— Abstention</button>
            </div>
          </div>`:''}
        ${rs.length===0?`<div class="empty">En attente des réponses...<br/><small style="display:block;margin-top:8px">Les réponses apparaîtront ici dès qu'un participant scannera le QR code.</small></div>`:''}
      </div>
      <div class="qr-panel">
        <h4 style="font-size:.88rem;font-weight:700;margin-bottom:14px">Participez</h4>
        <div class="qr-wrap" id="qr-inline"></div>
        <p style="font-size:.72rem;color:var(--muted);margin-bottom:14px">Scannez pour répondre</p>
        <button class="btn btn-dark" style="width:100%;font-size:.78rem;padding:9px;margin-bottom:8px" onclick="openQR('${S.item}')">
          ${IC.qr} Télécharger / Imprimer
        </button>
      </div>
    </div>
  </div>`;
}

function objCard(r) {
  const rc = r.risk==='Certain'?'rc':r.risk==='Probable'?'rp':'rh';
  return `
  <div class="obj-card">
    <div class="obj-top">
      <span class="obj-name">${esc(r.name)}</span>
      ${r.risk?`<span class="risk-b ${rc}">Risque ${r.risk}</span>`:''}
    </div>
    <div class="obj-fields">
      ${r.perception?`<div><div class="ofl">👁 Perception</div><div class="ofv">${r.perception}</div></div>`:''}
      ${r.interest?`<div><div class="ofl">👤 Intérêt</div><div class="ofv">${r.interest}</div></div>`:''}
    </div>
    <div class="obj-tags">
      <span class="tag ${r.collectiveInterest?'tg':'tr'}">⊕ Intérêt collectif: ${r.collectiveInterest?'Oui':'Non'}</span>
      <span class="tag ${r.verifiable?'tg':'tr'}">📋 Fait vérifiable: ${r.verifiable?'Oui':'Non'}</span>
      <span class="tag ${r.liftable?'tg':'tr'}">🔓 Risque levable: ${r.liftable?'Oui':'Non'}</span>
    </div>
    ${r.amendment?`<div class="amend"><div style="font-size:.7rem;font-weight:600;color:#713f12;margin-bottom:4px">💡 Amendement proposé:</div><em style="font-size:.82rem;color:#713f12">"${esc(r.amendment)}"</em></div>`:''}
  </div>`;
}

// ══════════════════════════════════════════════
// PROJECTION
// ══════════════════════════════════════════════
function vProjection() {
  const item = S.items[S.item];
  if (!item) return '';
  const rs = S.responses[S.item]||[];
  const ob = rs.filter(r=>r.hasObjection);
  const ok = rs.filter(r=>!r.hasObjection);

  return `
  <div class="proj">
    <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:44px">
      <div style="font-size:clamp(1.4rem,3vw,2.2rem);font-weight:800">${esc(item.title)}</div>
      <div style="display:flex;gap:12px;align-items:center">
        <span style="font-size:.78rem;color:#888;display:flex;align-items:center;gap:5px">
          <span style="width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite"></span> Live
        </span>
        <button onclick="go('item')" style="background:transparent;border:1px solid #333;color:#999;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Sora',sans-serif;font-size:.8rem">← Retour</button>
      </div>
    </div>
    <div class="proj-stats">
      <div class="proj-stat"><div class="proj-num" style="color:#fff">${rs.length}</div><div style="font-size:.82rem;color:#888;margin-top:8px">Réponses</div></div>
      <div class="proj-stat"><div class="proj-num" style="color:#4ade80">${ok.length}</div><div style="font-size:.82rem;color:#888;margin-top:8px">Sans objection</div></div>
      <div class="proj-stat"><div class="proj-num" style="color:#f87171">${ob.length}</div><div style="font-size:.82rem;color:#888;margin-top:8px">Objections</div></div>
    </div>
    ${ob.length>0?`
      <div style="font-size:.9rem;font-weight:700;color:#f87171;margin-bottom:14px">${IC.warn} Objections (${ob.length})</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
        ${ob.map(r=>`
          <div style="background:#1f0f0f;border:1px solid #7f1d1d;border-radius:12px;padding:18px">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px">
              <span style="font-weight:700;color:#f87171">${esc(r.name)}</span>
              ${r.risk?`<span style="font-size:.7rem;font-weight:700;border:1.5px solid #f87171;color:#f87171;padding:2px 8px;border-radius:4px">Risque ${r.risk}</span>`:''}
            </div>
            <div style="display:flex;gap:14px;margin-bottom:10px">
              ${r.perception?`<div><div style="font-size:.65rem;color:#555;text-transform:uppercase">Perception</div><div style="color:#f87171;font-weight:600;font-size:.82rem">${r.perception}</div></div>`:''}
              ${r.interest?`<div><div style="font-size:.65rem;color:#555;text-transform:uppercase">Intérêt</div><div style="color:#f87171;font-weight:600;font-size:.82rem">${r.interest}</div></div>`:''}
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:${r.amendment?'10px':'0'}">
              ${[`Intérêt collectif: ${r.collectiveInterest?'Oui':'Non'}`,`Fait vérifiable: ${r.verifiable?'Oui':'Non'}`,`Risque levable: ${r.liftable?'Oui':'Non'}`].map(t=>`
                <span style="font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:4px;background:${t.includes('Oui')?'#14532d':'#450a0a'};color:${t.includes('Oui')?'#4ade80':'#f87171'}">${t}</span>`).join('')}
            </div>
            ${r.amendment?`<div style="background:#1a1500;border:1px solid #713f12;border-radius:5px;padding:8px;margin-top:8px">
              <div style="font-size:.68rem;color:#92400e;font-weight:600;margin-bottom:3px">💡 Amendement</div>
              <div style="font-size:.78rem;color:#fde68a;font-style:italic">"${esc(r.amendment)}"</div>
            </div>`:''}
          </div>`).join('')}
      </div>`
    : rs.length>0?`
      <div style="text-align:center;padding:60px 0">
        <div style="font-size:5rem;margin-bottom:14px">🎉</div>
        <div style="font-size:2rem;font-weight:800;color:#4ade80">Consensus atteint</div>
        <div style="color:#888;margin-top:8px">Aucune objection — procédez au vote final.</div>
      </div>`
    : `<div style="text-align:center;padding:40px 0;color:#555">En attente des premières réponses...</div>`}
  </div>`;
}

    ${item?`<div class="p-org">Point à l'ordre du jour</div><div class="p-item-title">${esc(item.title)}</div>`:''}

  // ── Done screen ──
  if (S.pStep==='done') {
    // Start countdown if not already running
    if (!window._doneTimer) {
      S._doneCountdown = 18;
      window._doneTimer = setInterval(() => {
        S._doneCountdown--;
        const el = document.getElementById('done-countdown');
        if (el) el.textContent = S._doneCountdown;
        const bar = document.getElementById('done-bar');
        if (bar) bar.style.width = ((S._doneCountdown / 18) * 100) + '%';
        if (S._doneCountdown <= 0) {
          clearInterval(window._doneTimer);
          window._doneTimer = null;
          // Reset questionnaire but keep name
          S.pStep = 'name';
          S.pAnswers = {};
          render();
        }
      }, 1000);
    }
    return `
  <div class="p-body">
    ${hero()}
    <div class="p-content">
      <div class="p-done">
        <div class="p-done-icon">✅</div>
        <h2>Réponse enregistrée !</h2>
        <p>Merci pour votre participation.<br/>Vos réponses ont été transmises<br/>en temps réel à l'animateur.</p>
        <div style="margin-top:28px">
          <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">
            Nouveau questionnaire dans <strong id="done-countdown">${S._doneCountdown||18}</strong> secondes…
          </p>
          <div style="background:var(--border);border-radius:99px;height:6px;overflow:hidden">
            <div id="done-bar" style="height:100%;background:var(--green);border-radius:99px;transition:width 1s linear;width:${((S._doneCountdown||18)/18)*100}%"></div>
          </div>
          <button onclick="clearInterval(window._doneTimer);window._doneTimer=null;S.pStep='name';S.pAnswers={};render()"

            Recommencer maintenant
          </button>
        </div>
      </div>
    </div>
  </div>`;
  }

  // ── Name screen ──
  if (S.pStep==='name') return `
  <div class="p-body">
    ${hero()}
    <div class="p-content">
      <div class="p-name-card">
        <h2>Bienvenue 👋</h2>
        <p>Avant de commencer, entrez votre nom pour que l'animateur puisse identifier vos réponses.</p>
        <input class="p-input" id="p-name-in" placeholder="Prénom Nom" value="${esc(S.pName)}"
          autocomplete="name" inputmode="text"
          oninput="S.pName=this.value;document.getElementById('p-btn').disabled=!this.value.trim()"
          onkeydown="if(event.key==='Enter'&&S.pName.trim()){S.pStep='q1';render()}"/>
        <button class="p-btn" id="p-btn" ${S.pName.trim()?'':'disabled'}
          onclick="if(S.pName.trim()){S.pStep='q1';render()}">
          Commencer le questionnaire →
        </button>
      </div>
    </div>
  </div>`;

  // ── Questions ──
  const step = QUESTIONS.find(q=>q.k===S.pStep);
  if (!step) return '';

  const A = S.pAnswers;
  const total = A.hasObjection ? 8 : 1;
  const pct = Math.round((step.n/total)*100);
  const isYesNo = step.opts && step.opts.length===2 && step.opts[0]==='Oui';

  window._pOpt = (v) => {
    if (step.k==='q1') {
      A.hasObjection = (v==='Oui');
      if (v==='Non') { submitP(); return; }
      S.pStep='q2';
    } else if (step.k==='q2') { A.perception=v; S.pStep='q3'; }
    else if (step.k==='q3') { A.interest=v;   S.pStep='q4'; }
    else if (step.k==='q4') { A.risk=v;       S.pStep='q5'; }
    else if (step.k==='q5') { A.collectiveInterest=(v==='Oui'); S.pStep='q6'; }
    else if (step.k==='q6') { A.verifiable=(v==='Oui');         S.pStep='q7'; }
    else if (step.k==='q7') { A.liftable=(v==='Oui');           S.pStep='q8'; }
    render();
  };
  window._pAmend = () => {
    A.amendment = document.getElementById('p-amend')?.value||'';
    submitP();
  };

  return `
  <div class="p-body">
    ${hero()}
    <div class="p-content">
      <div class="p-progress">
        <div class="p-progress-top">
          <span class="p-step-label">Questionnaire socratique</span>
          <span class="p-step-count">${step.n} / ${total}</span>
        </div>
        <div class="p-bar"><div class="p-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-card">
        <div class="q-num">Question ${step.n}</div>
        <div class="q-txt">${step.q}</div>
        ${step.isAmendment?`
          <textarea class="p-textarea" id="p-amend"
            placeholder="Décrivez votre amendement (optionnel)...">${A.amendment||''}</textarea>
          <button class="p-btn" onclick="_pAmend()">
            Envoyer mes réponses ✓
          </button>`
        :`<div class="opts ${isYesNo?'opts-row':''}">
            ${step.opts.map(o=>`<button class="opt" onclick="_pOpt('${o}')">${o}</button>`).join('')}
          </div>`}
      </div>
    </div>
  </div>`;
}

function submitP() {
  const resp = {
    name: S.pName,
    hasObjection: S.pAnswers.hasObjection||false,
    perception: S.pAnswers.perception||null,
    interest:   S.pAnswers.interest||null,
    risk:       S.pAnswers.risk||null,
    collectiveInterest: S.pAnswers.collectiveInterest||false,
    verifiable: S.pAnswers.verifiable||false,
    liftable:   S.pAnswers.liftable||false,
    amendment:  S.pAnswers.amendment||'',
    ts: now()
  };
  if (window.FB) {
    window.FB.pushResponse(S.pItem, resp);
  }
  // Clear any existing timer before starting fresh
  if (window._doneTimer) { clearInterval(window._doneTimer); window._doneTimer = null; }
  S._doneCountdown = 18;
  S.pStep = 'done';
  render();
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function startItem(id) {
  if (!S.items[id]) return;
  const updated = {...S.items[id], status:'active'};
  window.FB?.saveItem(updated);
  S.items[id] = updated;
  go('item', {item:id});
}

function delSession(id) {
  if (!confirm('Supprimer cette session et tous ses points ?')) return;
  // Delete all items and responses for this session
  Object.values(S.items).filter(i=>i.sessionId===id).forEach(i=>{
    window.FB?.deleteItem(i.id);
    window.FB?.deleteResponses(i.id);
    delete S.items[i.id];
    delete S.responses[i.id];
  });
  window.FB?.deleteSession(id);
  delete S.sessions[id];
  go('home');
}

function delItem(id) {
  if (!confirm('Supprimer ce point et toutes ses réponses ?')) return;
  window.FB?.deleteItem(id);
  window.FB?.deleteResponses(id);
  delete S.items[id];
  delete S.responses[id];
  render();
}

// ══════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════
function openModal(html) {
  closeModal();
  const ov = document.createElement('div');
  ov.className='overlay'; ov.id='modal';
  ov.innerHTML=html;
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  ov.querySelector('.fi, input, textarea')?.focus();
}
function closeModal() { document.getElementById('modal')?.remove(); }

function openCreateSession() {
  openModal(`
  <div class="modal">
    <button class="m-close" onclick="closeModal()">✕</button>
    <h3>Créer une session</h3>
    <div class="fg"><label class="fl">Nom <span>*</span></label><input class="fi" id="m-sn" placeholder="Ex: AG Résidence Les Pins 2026"/></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-sd" placeholder="Informations sur l'assemblée..."></textarea></div>
    <button class="btn-submit" onclick="doCreateSession()">Créer la session</button>
  </div>`);
}
function doCreateSession() {
  const name = document.getElementById('m-sn')?.value?.trim();
  if (!name) return;
  const s = {id:uid(), name, description:document.getElementById('m-sd')?.value?.trim()||'', status:'active', createdAt:now()};
  window.FB?.saveSession(s);
  S.sessions[s.id] = s;
  closeModal();
  go('manage', {session:s.id});
}

let _cItemSession = null;
function openCreateItem(sid) {
  _cItemSession = sid;
  openModal(`
  <div class="modal">
    <button class="m-close" onclick="closeModal()">✕</button>
    <h3>Nouveau point à l'ordre du jour</h3>
    <div class="fg"><label class="fl">Titre <span>*</span></label><input class="fi" id="m-it" placeholder="Ex: Approbation du budget 2026"/></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-id" placeholder="Détails du point..."></textarea></div>
    <button class="btn-submit" onclick="doCreateItem()">Ajouter</button>
  </div>`);
}
function doCreateItem() {
  const title = document.getElementById('m-it')?.value?.trim();
  if (!title||!_cItemSession) return;
  const item = {id:uid(), sessionId:_cItemSession, title, description:document.getElementById('m-id')?.value?.trim()||'', status:'pending', createdAt:now()};
  window.FB?.saveItem(item);
  S.items[item.id] = item;
  S.responses[item.id] = [];
  closeModal();
  render();
}

function openQR(itemId) {
  const item = S.items[itemId];
  if (!item) return;
  const url = participantUrl(item.sessionId, itemId);
  openModal(`
  <div class="modal" style="max-width:400px;text-align:center">
    <button class="m-close" onclick="closeModal()">✕</button>
    <h3 style="text-align:left">QR Code</h3>
    <p style="font-size:.82rem;font-weight:600;text-align:left;margin-bottom:14px">${esc(item.title)}</p>
    <div id="qr-m" style="display:flex;justify-content:center;padding:16px;border:1px solid var(--border);border-radius:10px;background:#fff;margin-bottom:12px"></div>
    <p style="font-size:.68rem;color:var(--muted);word-break:break-all;margin-bottom:16px">${url}</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-dark" style="flex:1" onclick="dlQR('${itemId}')">${IC.dl} PNG</button>
      <button class="btn btn-outline" style="flex:1" onclick="printQR('${itemId}')">${IC.print} PDF</button>
    </div>
  </div>`);
  setTimeout(()=>{
    const c = document.getElementById('qr-m');
    if (c&&typeof QRCode!=='undefined') new QRCode(c,{text:url,width:220,height:220,correctLevel:QRCode.CorrectLevel.H});
  },60);
}

function dlQR(itemId) {
  const item=S.items[itemId]; if(!item) return;
  const cv=document.querySelector('#qr-m canvas'); if(!cv){alert('Patientez…');return;}
  const out=document.createElement('canvas'); out.width=400;out.height=480;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,400,480);
  ctx.fillStyle='#888';ctx.font='13px Arial';ctx.textAlign='center';ctx.fillText('Socratic Consensus',200,32);
  ctx.fillStyle='#1a1a18';ctx.font='bold 17px Arial';
  const ws=item.title.split(' ');let ln='',y=60;
  for(const w of ws){const t=ln+(ln?' ':'')+w;if(ctx.measureText(t).width>350&&ln){ctx.fillText(ln,200,y);ln=w;y+=24;}else ln=t;}
  ctx.fillText(ln,200,y);
  ctx.drawImage(cv,90,y+20,220,220);
  ctx.fillStyle='#aaa';ctx.font='12px Arial';ctx.fillText('📱 Scannez pour répondre',200,y+258);
  const a=document.createElement('a');
  a.download=`QR-${item.title.replace(/[^a-z0-9]/gi,'-')}.png`;
  a.href=out.toDataURL();a.click();
}

function printQR(itemId) {
  const item=S.items[itemId]; if(!item) return;
  const cv=document.querySelector('#qr-m canvas'); if(!cv) return;
  const url=participantUrl(item.sessionId,itemId);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap');
    body{font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#fff}
    .p{text-align:center;padding:20mm}
    .org{font-size:11pt;color:#aaa;margin-bottom:5mm}
    .title{font-size:22pt;font-weight:800;margin-bottom:10mm;color:#1a1a18;line-height:1.2}
    img{width:75mm;height:75mm;border:1px solid #eee;padding:5mm;border-radius:3mm;margin-bottom:8mm}
    .hint{font-size:11pt;color:#666;margin-bottom:4mm}
    .url{font-size:7.5pt;color:#bbb;word-break:break-all}
    @media print{@page{size:A5;margin:0}body{display:block}}
  </style></head><body>
  <div class="p">
    <div class="org">Socratic Consensus</div>
    <div class="title">${esc(item.title)}</div>
    <img src="${cv.toDataURL()}" alt="QR"/>
    <div class="hint">📱 Scannez pour répondre au questionnaire</div>
    <div class="url">${url}</div>
  </div>
  <script>setTimeout(()=>window.print(),500)<\/script>
  </body></html>`);
  w.document.close();
}

// ══════════════════════════════════════════════
// POST RENDER
// ══════════════════════════════════════════════
function afterRender() {
  // QR inline on item detail
  const qrIn = document.getElementById('qr-inline');
  if (qrIn && S.item) {
    const item = S.items[S.item];
    if (item && typeof QRCode!=='undefined') {
      setTimeout(()=>{
        if (document.getElementById('qr-inline') && !document.getElementById('qr-inline').innerHTML) {
          new QRCode(document.getElementById('qr-inline'),{
            text:participantUrl(item.sessionId,S.item), width:160, height:160, correctLevel:QRCode.CorrectLevel.H
          });
        }
      },80);
    }
  }
  // Focus participant name
  setTimeout(()=>document.getElementById('p-name-in')?.focus(),80);
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// FIREBASE LISTENERS
// ══════════════════════════════════════════════
function setupFirebase() {
  if (!window.FB) return;
  window.FB.watchSessions(data => { S.sessions=data; render(); });
  window.FB.watchItems(data    => { S.items=data;    render(); });
  window.FB.watchAllResponses(data => { S.responses=data; render(); });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function parseParticipantHash(hash) {
  if (hash.startsWith('#participate/') || hash.startsWith('#/participate/')) {
    const parts = hash.replace('#/','#').slice(1).split('/');
    return { pSession: parts[1], pItem: parts[2] };
  }
  return null;
}

function init() {
  // Check hash for participant mode
  const parsed = parseParticipantHash(location.hash);
  if (parsed) {
    // Clear any running done timer
    if (window._doneTimer) { clearInterval(window._doneTimer); window._doneTimer = null; }
    S.pSession = parsed.pSession;
    S.pItem    = parsed.pItem;
    S.pStep    = 'name';
    S.pName    = '';
    S.pAnswers = {};
    S._doneCountdown = 18;
    S.view     = 'participant';
  }
  setupFirebase();
  render();
}

// Listen for hash changes (e.g. scanning a different QR code for a new agenda item)
window.addEventListener('hashchange', () => {
  const parsed = parseParticipantHash(location.hash);
  if (parsed) {
    // New QR code scanned — reset questionnaire for the new item
    if (window._doneTimer) { clearInterval(window._doneTimer); window._doneTimer = null; }
    S.pSession = parsed.pSession;
    S.pItem    = parsed.pItem;
    S.pStep    = 'name';
    S.pName    = '';
    S.pAnswers = {};
    S._doneCountdown = 18;
    S.view     = 'participant';
    render();
  }
});

if (window._fbReady) {
  init();
} else {
  window.addEventListener('fb-ready', init);
  setTimeout(()=>{ if(!window._fbReady) init(); }, 2000);
}
</script>
